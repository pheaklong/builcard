<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បង្កើតបណ្ណសម្គាល់សិស្ស</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Khmer', 'Khmer OS Moul Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: #4A86E8;
            color: white;
        }

        .btn-primary:hover {
            background: #3a6ec8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .filter-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .stat-item span:first-child {
            font-weight: bold;
            color: #666;
        }

        .stat-item span:last-child {
            color: #4A86E8;
            font-weight: bold;
            margin-left: 8px;
        }

        .students-list {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 400px;
            overflow-y: auto;
        }

        .students-list h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .student-item:hover {
            background: #f8f9fa;
        }

        .student-info {
            flex: 1;
        }

        .student-name {
            font-weight: bold;
            color: #333;
        }

        .student-details {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .student-checkbox {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .cards-container {
                grid-template-columns: 1fr;
            }
            
            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏫 បង្កើតបណ្ណសម្គាល់សិស្ស</h1>
            <div class="button-group">
                <button class="btn-secondary" onclick="window.location.href='index.html'">🏠 ទំព័រដើម</button>
                <button class="btn-secondary" onclick="window.location.href='create.html'">➕ បន្ថែមសិស្ស</button>
                <button class="btn-secondary" onclick="window.location.href='search.html'">🔍 ស្វែងរកសិស្ស</button>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ស្វែងរកតាមឈ្មោះ ឬ អត្តលេខ..." onkeyup="filterStudents()">
            </div>
            <div class="filter-group">
                <select id="classFilter" onchange="filterStudents()">
                    <option value="">ទាំងអស់</option>
                </select>
                <select id="genderFilter" onchange="filterStudents()">
                    <option value="">ទាំងអស់</option>
                    <option value="ប្រុស">ប្រុស</option>
                    <option value="ស្រី">ស្រី</option>
                </select>
            </div>
            <div class="stats">
                <div class="stat-item"><span>សរុបសិស្ស:</span><span id="totalCount">0</span></div>
                <div class="stat-item"><span>បានជ្រើសរើស:</span><span id="selectedCount">0</span></div>
            </div>
            <div class="button-group" style="margin-top: 15px;">
                <button class="btn-primary" onclick="selectAll()">✓ ជ្រើសរើសទាំងអស់</button>
                <button class="btn-secondary" onclick="deselectAll()">✗ មិនជ្រើសរើសទាំងអស់</button>
                <button class="btn-success" onclick="generateSelectedCards()">🃏 បង្កើតកាត</button>
                <button class="btn-danger" onclick="clearSelected()">🗑 លុបដែលបានជ្រើស</button>
            </div>
        </div>

        <div class="students-list">
            <h3>📋 បញ្ជីសិស្ស</h3>
            <div id="studentsList"></div>
        </div>

        <div id="cardsContainer" class="cards-container"></div>
    </div>

    <script src="../js/card-template.js"></script>
    <script>
        let allStudents = [];
        let selectedStudentIds = new Set();

        // ផ្ទុកទិន្នន័យសិស្ស
        function loadStudents() {
            const saved = localStorage.getItem('students');
            if (saved) {
                allStudents = JSON.parse(saved);
                console.log('Loaded students:', allStudents.length);
            } else {
                allStudents = [];
                console.log('No students found');
            }
            populateClassFilter();
            filterStudents();
        }

        // បំពេញតម្រងថ្នាក់
        function populateClassFilter() {
            const classes = [...new Set(allStudents.map(s => s.class).filter(c => c))];
            const classFilter = document.getElementById('classFilter');
            classes.forEach(className => {
                const option = document.createElement('option');
                option.value = className;
                option.textContent = className;
                classFilter.appendChild(option);
            });
        }

        // ត្រងសិស្ស
        function filterStudents() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const classFilter = document.getElementById('classFilter').value;
            const genderFilter = document.getElementById('genderFilter').value;

            const filtered = allStudents.filter(student => {
                const matchSearch = student.name.toLowerCase().includes(searchTerm) || 
                                  (student.studentID && student.studentID.toLowerCase().includes(searchTerm));
                const matchClass = !classFilter || student.class === classFilter;
                const matchGender = !genderFilter || student.sex === genderFilter;
                return matchSearch && matchClass && matchGender;
            });

            displayStudents(filtered);
            document.getElementById('totalCount').textContent = filtered.length;
        }

        // បង្ហាញបញ្ជីសិស្ស
        function displayStudents(students) {
            const container = document.getElementById('studentsList');
            if (students.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">មិនមានទិន្នន័យសិស្ស</div>';
                return;
            }

            container.innerHTML = students.map(student => `
                <div class="student-item">
                    <input type="checkbox" class="student-checkbox" 
                           data-id="${student.studentID}"
                           ${selectedStudentIds.has(student.studentID) ? 'checked' : ''}
                           onchange="toggleStudent('${student.studentID}')">
                    <div class="student-info">
                        <div class="student-name">${escapeHtml(student.name) || 'មិនមានឈ្មោះ'}</div>
                        <div class="student-details">
                            អត្តលេខ: ${student.studentID || '_____'} | 
                            ថ្នាក់: ${student.class || '_____'} | 
                            ភេទ: ${student.sex || '_____'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ប្តូរស្ថានភាពជ្រើសរើសសិស្ស
        function toggleStudent(studentId) {
            if (selectedStudentIds.has(studentId)) {
                selectedStudentIds.delete(studentId);
            } else {
                selectedStudentIds.add(studentId);
            }
            updateSelectedCount();
        }

        // ជ្រើសរើសទាំងអស់
        function selectAll() {
            const checkboxes = document.querySelectorAll('.student-checkbox');
            checkboxes.forEach(cb => {
                const id = cb.getAttribute('data-id');
                selectedStudentIds.add(id);
                cb.checked = true;
            });
            updateSelectedCount();
        }

        // មិនជ្រើសរើសទាំងអស់
        function deselectAll() {
            const checkboxes = document.querySelectorAll('.student-checkbox');
            checkboxes.forEach(cb => {
                const id = cb.getAttribute('data-id');
                selectedStudentIds.delete(id);
                cb.checked = false;
            });
            updateSelectedCount();
        }

        // លុបសិស្សដែលបានជ្រើសរើស
        function clearSelected() {
            if (selectedStudentIds.size === 0) {
                alert('សូមជ្រើសរើសសិស្សជាមុនសិន');
                return;
            }
            
            if (confirm(`តើអ្នកចង់លុបសិស្សចំនួន ${selectedStudentIds.size} នាក់ទេ?`)) {
                allStudents = allStudents.filter(s => !selectedStudentIds.has(s.studentID));
                localStorage.setItem('students', JSON.stringify(allStudents));
                selectedStudentIds.clear();
                loadStudents();
                updateSelectedCount();
            }
        }

        // ធ្វើបច្ចុប្បន្នភាពចំនួនដែលបានជ្រើសរើស
        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedStudentIds.size;
        }

        // បង្កើតកាតសម្រាប់សិស្សដែលបានជ្រើសរើស
        function generateSelectedCards() {
            const selectedStudents = allStudents.filter(s => selectedStudentIds.has(s.studentID));
            
            if (selectedStudents.length === 0) {
                alert('សូមជ្រើសរើសសិស្សយ៉ាងហោចណាស់ម្នាក់');
                return;
            }

            console.log('Generating cards for', selectedStudents.length, 'students');
            
            // ពិនិត្យមើលថា function generateSmallCardHTML មានឬអត់
            let cardsHtml = '';
            
            if (typeof generateSmallCardHTML !== 'undefined' && generateSmallCardHTML) {
                console.log('✅ Using generateSmallCardHTML function');
                cardsHtml = selectedStudents.map(student => generateSmallCardHTML(student)).join('');
            } else if (typeof generateCardHTML !== 'undefined' && generateCardHTML) {
                console.log('⚠️ Using generateCardHTML as fallback');
                cardsHtml = selectedStudents.map(student => generateCardHTML(student)).join('');
            } else {
                console.error('❌ No card generation function available!');
                document.getElementById('cardsContainer').innerHTML = `
                    <div class="error-message">
                        <strong>កំហុស!</strong> មិនអាចផ្ទុក template កាតបានទេ។<br>
                        សូម Refresh ទំព័រ ឬពិនិត្យមើលការតភ្ជាប់ឯកសារ card-template.js
                    </div>
                `;
                return;
            }
            
            document.getElementById('cardsContainer').innerHTML = cardsHtml;
            console.log('Cards displayed successfully');
            
            // រំកិលទៅកាន់កន្លែងបង្ហាញកាត
            document.getElementById('cardsContainer').scrollIntoView({ behavior: 'smooth' });
        }

        // Escape HTML function
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // បោះពុម្ពកាត
        function printCards() {
            const cardsContainer = document.getElementById('cardsContainer');
            if (!cardsContainer.innerHTML.trim()) {
                alert('មិនមានកាតសម្រាប់បោះពុម្ពទេ');
                return;
            }
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>បោះពុម្ពបណ្ណសម្គាល់សិស្ស</title>
                    <style>
                        body { font-family: 'Khmer', sans-serif; padding: 20px; }
                        @media print {
                            body { margin: 0; padding: 0; }
                        }
                    </style>
                </head>
                <body>
                    ${cardsContainer.innerHTML}
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        // ផ្ទុកទិន្នន័យនៅពេលទំព័រផ្ទុក
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, initializing...');
            console.log('generateSmallCardHTML exists:', typeof generateSmallCardHTML !== 'undefined');
            console.log('generateCardHTML exists:', typeof generateCardHTML !== 'undefined');
            loadStudents();
        });
    </script>
</body>
</html>
