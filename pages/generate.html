<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បង្កើតកាតសិស្សច្រើននាក់ - Generate Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        .card-preview { transition: all 0.3s ease; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="mb-4 no-print">
            <a href="../index.html" class="text-blue-600 hover:text-blue-800">← ត្រឡប់ទៅមេនុយ</a>
            <a href="search.html" class="text-green-600 hover:text-green-800 ml-4">← ត្រឡប់ទៅស្វែងរក</a>
        </div>
        
        <h1 class="text-3xl font-bold text-center mb-8 text-purple-600">📇 បង្កើតកាតសិស្សច្រើននាក់</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="text-xl font-bold text-gray-700">👥 បញ្ជីសិស្សដែលបានជ្រើសរើស <span id="selectedCount" class="text-blue-600">(0 នាក់)</span></h2>
                <div class="space-x-2">
                    <button id="clearAllBtn" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">🗑️ លុបទាំងអស់</button>
                    <button id="generateCardsBtn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700" disabled>🖨️ បង្កើតកាតសិស្ស (0)</button>
                </div>
            </div>
            <div id="selectedStudentsList" class="min-h-[200px]">
                <div class="text-center py-8 text-gray-500">
                    <svg class="w-16 h-16 mx-auto mb-2 text-gray-300" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                    </svg>
                    <p>មិនមានសិស្សដែលបានជ្រើសរើសទេ</p>
                    <p class="text-sm mt-2">សូមចូលទៅកាន់ទំព័រ <a href="search.html" class="text-blue-600 font-semibold">ស្វែងរកសិស្ស</a> ដើម្បីជ្រើសរើសសិស្ស</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal for displaying all cards -->
    <div id="cardsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 overflow-y-auto no-print">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-6xl w-full max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center flex-wrap gap-2">
                    <h3 class="text-xl font-bold text-gray-800">🪪 កាតសិស្សទាំងអស់</h3>
                    <div class="space-x-2">
                        <button id="printAllCards" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">🖨️ បោះពុម្ពទាំងអស់</button>
                        <button id="closeModalBtn" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">✖ បិទ</button>
                    </div>
                </div>
                <div id="cardsContainer" class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Cards will be generated here -->
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let selectedStudents = [];
        
        // ============================================
        // LOAD SELECTED STUDENTS FROM LOCALSTORAGE
        // ============================================
        function loadSelectedStudents() {
            const stored = localStorage.getItem('selectedStudents');
            if (stored) {
                selectedStudents = JSON.parse(stored);
                displaySelectedStudents();
            } else {
                displaySelectedStudents();
            }
        }
        
        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function getPhotoHTML(photoData) {
            if (photoData && photoData !== 'null' && photoData !== '') {
                return `<img src="${photoData}" alt="Student Photo" class="w-16 h-16 rounded-full object-cover border-2 border-yellow-400">`;
            }
            return `<div class="w-16 h-16 bg-gray-300 rounded-full flex items-center justify-center text-gray-500">
                        <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                        </svg>
                    </div>`;
        }
        
        // ============================================
        // CARD GENERATION FUNCTION (កូដបង្កើតកាត)
        // ============================================
        function generateCardHTML(student) {
            const birthDate = student.date_of_birth ? new Date(student.date_of_birth).toLocaleDateString('km-KH') : 'N/A';
            const photoHTML = getPhotoHTML(student.photo);
            
            return `
                <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition-shadow" style="width: 350px; font-family: 'Khmer', Arial, sans-serif;">
                    <div class="bg-white p-3 text-center border-b-2 border-yellow-400">
                        <h3 class="text-md font-bold text-blue-800">កាតសម្គាល់សិស្ស</h3>
                        <p class="text-xs text-gray-600">សាលារៀន​ ឌីជីថល</p>
                    </div>
                    <div class="p-3 text-white">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex-1">
                                <p class="text-xs opacity-90">លេខសម្គាល់៖</p>
                                <p class="font-bold text-sm">${escapeHtml(student.studentID) || 'N/A'}</p>
                            </div>
                            ${photoHTML}
                        </div>
                        <div class="space-y-1 text-xs">
                            <div><p class="opacity-90">ឈ្មោះ៖</p><p class="font-semibold">${escapeHtml(student.name) || 'N/A'}</p></div>
                            <div class="grid grid-cols-2 gap-1">
                                <div><p class="opacity-90">ភេទ៖</p><p>${escapeHtml(student.sex) || 'N/A'}</p></div>
                                <div><p class="opacity-90">ថ្ងៃកំណើត៖</p><p>${birthDate}</p></div>
                            </div>
                            <div><p class="opacity-90">ថ្នាក់៖</p><p class="font-medium">${escapeHtml(student.class) || 'N/A'}</p></div>
                            <div><p class="opacity-90">ទូរស័ព្ទ៖</p><p>${escapeHtml(student.phonenumber) || 'N/A'}</p></div>
                        </div>
                        <hr class="my-2 border-white/30">
                        <div class="text-xs space-y-0.5">
                            <p><span class="opacity-90">ឪពុក៖</span> ${escapeHtml(student.fathername) || 'N/A'}</p>
                            <p><span class="opacity-90">ម្តាយ៖</span> ${escapeHtml(student.mothername) || 'N/A'}</p>
                        </div>
                    </div>
                    <div class="bg-yellow-400 p-1.5 text-center text-[10px] font-bold text-blue-900">
                        ចេញថ្ងៃទី: ${new Date().toLocaleDateString('km-KH')}
                    </div>
                </div>
            `;
        }
        
        // ============================================
        // DISPLAY SELECTED STUDENTS
        // ============================================
        function displaySelectedStudents() {
            const container = document.getElementById('selectedStudentsList');
            const countSpan = document.getElementById('selectedCount');
            const generateBtn = document.getElementById('generateCardsBtn');
            
            if (!selectedStudents || selectedStudents.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <svg class="w-16 h-16 mx-auto mb-2 text-gray-300" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                        </svg>
                        <p>មិនមានសិស្សដែលបានជ្រើសរើសទេ</p>
                        <p class="text-sm mt-2">សូមចូលទៅកាន់ទំព័រ <a href="search.html" class="text-blue-600 font-semibold">ស្វែងរកសិស្ស</a> ដើម្បីជ្រើសរើសសិស្ស</p>
                    </div>
                `;
                if (countSpan) countSpan.innerHTML = '(0 នាក់)';
                if (generateBtn) {
                    generateBtn.innerHTML = '🖨️ បង្កើតកាតសិស្ស (0)';
                    generateBtn.disabled = true;
                }
                return;
            }
            
            if (countSpan) countSpan.innerHTML = `(${selectedStudents.length} នាក់)`;
            if (generateBtn) {
                generateBtn.innerHTML = `🖨️ បង្កើតកាតសិស្ស (${selectedStudents.length})`;
                generateBtn.disabled = false;
            }
            
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${selectedStudents.map(student => `
                        <div class="border rounded-lg p-3 flex justify-between items-center hover:bg-gray-50">
                            <div class="flex items-center space-x-3">
                                ${student.photo ? 
                                    `<img src="${student.photo}" class="w-10 h-10 rounded-full object-cover">` : 
                                    `<div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center">
                                        <svg class="w-6 h-6 text-gray-500" fill="currentColor" viewBox="0 0 20 20">
                                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                                        </svg>
                                    </div>`
                                }
                                <div>
                                    <p class="font-semibold">${escapeHtml(student.name)}</p>
                                    <p class="text-sm text-gray-600">${escapeHtml(student.studentID)} | ${escapeHtml(student.class) || 'N/A'}</p>
                                </div>
                            </div>
                            <button onclick="removeStudent('${student.studentID}')" class="text-red-600 hover:text-red-800">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                                </svg>
                            </button>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // ============================================
        // REMOVE STUDENT FUNCTION (Global for onclick)
        // ============================================
        window.removeStudent = (studentID) => {
            selectedStudents = selectedStudents.filter(s => s.studentID !== studentID);
            localStorage.setItem('selectedStudents', JSON.stringify(selectedStudents));
            displaySelectedStudents();
        };
        
        // ============================================
        // CLEAR ALL STUDENTS
        // ============================================
        document.getElementById('clearAllBtn')?.addEventListener('click', () => {
            if (confirm('តើអ្នកចង់លុបសិស្សទាំងអស់មែនទេ?')) {
                selectedStudents = [];
                localStorage.setItem('selectedStudents', JSON.stringify(selectedStudents));
                displaySelectedStudents();
            }
        });
        
        // ============================================
        // GENERATE ALL CARDS
        // ============================================
        document.getElementById('generateCardsBtn')?.addEventListener('click', () => {
            if (!selectedStudents || selectedStudents.length === 0) {
                alert('មិនមានសិស្សដើម្បីបង្កើតកាតទេ');
                return;
            }
            
            // Generate cards HTML
            const cardsHTML = selectedStudents.map(student => generateCardHTML(student)).join('');
            const modal = document.getElementById('cardsModal');
            const container = document.getElementById('cardsContainer');
            container.innerHTML = cardsHTML;
            modal.classList.remove('hidden');
        });
        
        // ============================================
        // PRINT ALL CARDS
        // ============================================
        document.getElementById('printAllCards')?.addEventListener('click', () => {
            const cardsHTML = document.getElementById('cardsContainer').innerHTML;
            if (!cardsHTML || cardsHTML.trim() === '') {
                alert('មិនមានកាតដើម្បីបោះពុម្ពទេ');
                return;
            }
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                    <head>
                        <title>បោះពុម្ពកាតសិស្ស</title>
                        <meta charset="UTF-8">
                        <style>
                            body {
                                display: flex;
                                flex-wrap: wrap;
                                justify-content: center;
                                gap: 20px;
                                padding: 20px;
                                margin: 0;
                                font-family: 'Khmer', Arial, sans-serif;
                            }
                            @media print {
                                body {
                                    padding: 0;
                                    gap: 10px;
                                }
                                div {
                                    break-inside: avoid;
                                    page-break-inside: avoid;
                                }
                            }
                        </style>
                    </head>
                    <body>${cardsHTML}</body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        });
        
        // ============================================
        // MODAL CONTROLS
        // ============================================
        document.getElementById('closeModalBtn')?.addEventListener('click', () => {
            document.getElementById('cardsModal').classList.add('hidden');
        });
        
        document.getElementById('cardsModal')?.addEventListener('click', (e) => {
            if (e.target === document.getElementById('cardsModal')) {
                document.getElementById('cardsModal').classList.add('hidden');
            }
        });
        
        // ============================================
        // INITIALIZE
        // ============================================
        loadSelectedStudents();
        
        // Log to console
        console.log('✅ Generate page loaded successfully');
    </script>
</body>
</html>
