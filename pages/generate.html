<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បង្កើតកាតសិស្សច្រើននាក់</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap" rel="stylesheet">
    <style>*{font-family:'Khmer','Moul',Arial,sans-serif;}@media print{.no-print{display:none;}}</style>
</head>
<body class="bg-gradient-to-br from-amber-100 to-yellow-100">
    <div class="container mx-auto px-4 py-8">
        <div class="mb-4 no-print">
            <a href="../index.html" class="text-amber-800 hover:text-amber-600">← ត្រឡប់ទៅមេនុយ</a>
            <a href="search.html" class="text-green-700 hover:text-green-600 ml-4">← ត្រឡប់ទៅស្វែងរក</a>
        </div>
        <h1 class="text-3xl font-bold text-center mb-8 text-amber-900">📇 បង្កើតកាតសិស្សច្រើននាក់</h1>
        <div class="bg-white rounded-lg shadow-lg p-6 border-2 border-amber-300">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="text-xl font-bold text-amber-800">👥 បញ្ជីសិស្សដែលបានជ្រើសរើស <span id="selectedCount" class="text-blue-600">(0 នាក់)</span></h2>
                <div class="space-x-2">
                    <button id="clearAllBtn" class="bg-red-700 text-white px-4 py-2 rounded-lg hover:bg-red-800">🗑️ លុបទាំងអស់</button>
                    <button id="generateCardsBtn" class="bg-green-700 text-white px-6 py-2 rounded-lg hover:bg-green-800" disabled>🖨️ បង្កើតកាត (0)</button>
                </div>
            </div>
            <div id="selectedStudentsList" class="min-h-[200px]"><div class="text-center py-8 text-gray-500">មិនមានសិស្សដែលបានជ្រើសរើសទេ</div></div>
        </div>
    </div>
    <div id="cardsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 overflow-y-auto no-print">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="bg-white rounded-lg shadow-xl max-w-6xl w-full max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center">
                    <h3 class="text-xl font-bold text-gray-800">🪪 កាតសិស្សទាំងអស់</h3>
                    <div class="space-x-2">
                        <button id="printAllCards" class="bg-purple-700 text-white px-4 py-2 rounded-lg hover:bg-purple-800">🖨️ បោះពុម្ពទាំងអស់</button>
                        <button id="closeModalBtn" class="bg-red-700 text-white px-4 py-2 rounded-lg hover:bg-red-800">✖ បិទ</button>
                    </div>
                </div>
                <div id="cardsContainer" class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>
    
    <script src="../js/card-template.js"></script>
    <script>
        let selectedStudents = [];
        function loadSelectedStudents() {
            const stored = localStorage.getItem('selectedStudents');
            if (stored) { selectedStudents = JSON.parse(stored); displaySelectedStudents(); }
        }
        function displaySelectedStudents() {
            const container = document.getElementById('selectedStudentsList');
            const countSpan = document.getElementById('selectedCount');
            const genBtn = document.getElementById('generateCardsBtn');
            if (!selectedStudents.length) {
                container.innerHTML = '<div class="text-center py-8 text-gray-500">មិនមានសិស្សដែលបានជ្រើសរើសទេ</div>';
                if(countSpan) countSpan.innerHTML='(0 នាក់)';
                if(genBtn){genBtn.innerHTML='🖨️ បង្កើតកាត (0)'; genBtn.disabled=true;}
                return;
            }
            if(countSpan) countSpan.innerHTML=`(${selectedStudents.length} នាក់)`;
            if(genBtn){genBtn.innerHTML=`🖨️ បង្កើតកាត (${selectedStudents.length})`; genBtn.disabled=false;}
            container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">${selectedStudents.map(s => `<div class="flex justify-between items-center bg-amber-50 rounded-lg p-3"><div><p class="font-semibold">${escapeHtml(s.name)}</p><p class="text-xs text-gray-500">${escapeHtml(s.studentID)} | ${escapeHtml(s.class)}</p></div><button onclick="removeStudent('${s.studentID}')" class="text-red-600">✖</button></div>`).join('')}</div>`;
        }
        window.removeStudent = (id) => { selectedStudents = selectedStudents.filter(s => s.studentID !== id); localStorage.setItem('selectedStudents', JSON.stringify(selectedStudents)); displaySelectedStudents(); };
        document.getElementById('clearAllBtn')?.addEventListener('click', () => { if(confirm('លុបទាំងអស់?')){ selectedStudents=[]; localStorage.setItem('selectedStudents','[]'); displaySelectedStudents(); } });
        document.getElementById('generateCardsBtn')?.addEventListener('click', () => { if(selectedStudents.length){ document.getElementById('cardsContainer').innerHTML = selectedStudents.map(generateSmallCardHTML).join(''); document.getElementById('cardsModal').classList.remove('hidden'); } else alert('មិនមានសិស្ស'); });
        document.getElementById('printAllCards')?.addEventListener('click', () => { const html = document.getElementById('cardsContainer').innerHTML; const w = window.open('','_blank'); w.document.write(`<html><head><title>កាតសិស្ស</title><meta charset="UTF-8"><style>body{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:20px;}@media print{body{padding:0;gap:10px;}div{break-inside:avoid;}}</style></head><body>${html}</body></html>`); w.document.close(); w.print(); });
        document.getElementById('closeModalBtn')?.addEventListener('click', () => document.getElementById('cardsModal').classList.add('hidden'));
        document.getElementById('cardsModal')?.addEventListener('click', (e) => { if(e.target === document.getElementById('cardsModal')) document.getElementById('cardsModal').classList.add('hidden'); });
        loadSelectedStudents();
    </script>
</body>
</html>
