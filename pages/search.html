<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ស្វែងរកសិស្ស - Search Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .checkbox-custom {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .hover-bg:hover {
            background-color: #f3f4f6;
        }
        @media print {
            .no-print { display: none; }
        }
        .class-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #e5e7eb;
            color: #374151;
        }
        .class-badge:hover {
            background-color: #3b82f6;
            color: white;
            transform: scale(1.02);
        }
        .filter-input {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .filter-input:focus {
            border-color: #3b82f6;
            ring: 2px solid #3b82f6;
        }
        .classes-container {
            max-height: 180px;
            overflow-y: auto;
            padding: 5px;
        }
        .classes-container::-webkit-scrollbar {
            width: 6px;
        }
        .classes-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .classes-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        /* Table styles */
        .student-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }
        .student-table th {
            position: sticky;
            top: 0;
            background-color: #f9fafb;
            z-index: 10;
        }
        .table-container {
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            overflow-x: auto;
        }
    </style>
    <script src="js/auth.js"></script>
    <script>
        // Protect this page
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="mb-4 no-print">
            <a href="../index.html" class="text-blue-600 hover:text-blue-800">← ត្រឡប់ទៅមេនុយ</a>
        </div>
        
        <h1 class="text-3xl font-bold text-center mb-8 text-green-600">🔍 ស្វែងរក និងជ្រើសរើសសិស្ស</h1>
        
        <!-- Search Section -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8 no-print">
            <!-- Class Filter Dropdown -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">🏫 ជ្រើសរើសថ្នាក់</label>
                <select id="classSelect" class="w-full md:w-1/2 rounded-lg border border-gray-300 p-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="">-- ទាំងអស់ --</option>
                </select>
            </div>
            
            <!-- Quick Class Badges with Search -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">📚 ថ្នាក់ទាំងអស់ (ចុចដើម្បីស្វែងរក)</label>
                <div class="bg-gray-50 rounded-lg p-3 border border-gray-200">
                    <input type="text" id="classFilterInput" class="filter-input" placeholder="🔍 ស្វែងរកថ្នាក់...">
                    <div id="quickClasses" class="classes-container">
                        <div class="text-gray-400 text-sm text-center py-4">កំពុងផ្ទុកបញ្ជីថ្នាក់...</div>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">✏️ ស្វែងរកតាមឈ្មោះ</label>
                    <input type="text" id="searchName" placeholder="បញ្ចូលឈ្មោះសិស្ស..." class="w-full rounded-lg border border-gray-300 p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div class="flex space-x-2 items-end">
                    <button id="searchBtn" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg hover:bg-blue-700 transition flex-1 font-medium">🔍 ស្វែងរក</button>
                    <button id="resetBtn" class="bg-gray-500 text-white px-5 py-2.5 rounded-lg hover:bg-gray-600 transition flex-1 font-medium">🔄 កំណត់ឡើងវិញ</button>
                </div>
            </div>
        </div>
        
        <!-- Search Results with Selection -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="flex flex-wrap justify-between items-center mb-5 gap-3">
                <div class="flex items-center space-x-3">
                    <h2 class="text-xl font-bold text-gray-800">📋 លទ្ធផលស្វែងរក</h2>
                    <span id="resultCount" class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-semibold"></span>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button id="selectAllBtn" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition text-sm font-medium">☑️ ជ្រើសទាំងអស់</button>
                    <button id="deselectAllBtn" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition text-sm font-medium">☐ មិនជ្រើសទាំងអស់</button>
                    <button id="addSelectedBtn" class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 transition font-medium">
                        ➕ បន្ថែម (<span id="selectedCount">0</span>)
                    </button>
                </div>
            </div>
            <div id="searchResults" class="table-container">
                <div class="text-center py-12">
                    <svg class="w-20 h-20 mx-auto text-gray-300 mb-3" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                    </svg>
                    <p class="text-gray-500 text-lg">សូមបញ្ចូលពាក្យស្វែងរក ឬចុចបង្ហាញទាំងអស់</p>
                </div>
            </div>
        </div>
        
        <!-- Selected Students Summary -->
        <div class="mt-8 bg-white rounded-xl shadow-lg p-6 no-print">
            <h2 class="text-xl font-bold mb-4 text-gray-800">✅ សិស្សដែលបានជ្រើសរើស</h2>
            <div id="selectedSummary" class="min-h-[120px]">
                <div class="text-center py-8 text-gray-500">
                    <p>មិនទាន់មានសិស្សដែលបានជ្រើសរើសទេ</p>
                </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button id="goToGenerateBtn" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg hover:bg-indigo-700 transition font-medium">
                    🖨️ បន្តទៅបង្កើតកាត (<span id="finalSelectedCount">0</span>)
                </button>
            </div>
        </div>
    </div>
    
    <script>
    // ============================================
    // SUPABASE CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://xmowdtwlidnwnxrkrysj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhtb3dkdHdsaWRud254cmtyeXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzI2MDAsImV4cCI6MjA5NjAwODYwMH0.p22ZAL4oRIMVd9xYotVhRcWDICLqVp_LTj_AszA9JAA';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const TABLE_NAME = 'table_student';
    
    // Global variables
    let currentStudents = [];
    let selectedStudents = new Map();
    let allClassNamesList = [];
    
    // ============================================
    // HELPER FUNCTIONS
    // ============================================
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showInfoBanner(message, isError = false) {
        let banner = document.getElementById('infoBanner');
        if (banner) banner.remove();
        
        banner = document.createElement('div');
        banner.id = 'infoBanner';
        banner.className = `${isError ? 'bg-red-100 border-red-500 text-red-700' : 'bg-blue-100 border-blue-500 text-blue-700'} border-l-4 p-4 mb-5 rounded shadow-md`;
        
        banner.innerHTML = `
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                    </svg>
                    <span>${message}</span>
                </div>
                <button onclick="this.parentElement.parentElement.remove()" class="hover:opacity-70">✖</button>
            </div>
        `;
        
        const searchSection = document.querySelector('.bg-white.rounded-xl.shadow-lg.p-6.mb-8');
        if (searchSection) {
            searchSection.parentNode.insertBefore(banner, searchSection.nextSibling);
        }
        
        setTimeout(() => { if (banner && banner.parentNode) banner.remove(); }, 4000);
    }
    
    // ============================================
    // LOAD UNIQUE CLASS NAMES WITH PAGINATION
    // ============================================
    async function loadClassNames() {
        try {
            const quickContainer = document.getElementById('quickClasses');
            if (quickContainer) quickContainer.innerHTML = '<div class="text-gray-400 text-sm text-center py-4">កំពុងផ្ទុកបញ្ជីថ្នាក់...</div>';
            
            const { count, error: countError } = await supabaseClient
                .from(TABLE_NAME)
                .select('*', { count: 'exact', head: true })
                .not('class', 'is', null);
            
            if (countError) throw countError;
            
            const totalStudents = count;
            console.log(`📊 Total students with class: ${totalStudents}`);
            
            const batchSize = 1000;
            const allClassNamesSet = new Set();
            
            for (let i = 0; i < totalStudents; i += batchSize) {
                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('class')
                    .not('class', 'is', null)
                    .range(i, i + batchSize - 1);
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    data.forEach(item => {
                        if (item.class && item.class.trim() !== '') {
                            allClassNamesSet.add(item.class);
                        }
                    });
                }
            }
            
            allClassNamesList = Array.from(allClassNamesSet).sort((a, b) => {
                const gradeA = parseInt(a.match(/\d+/)?.[0] || 0);
                const gradeB = parseInt(b.match(/\d+/)?.[0] || 0);
                if (gradeA && gradeB) return gradeA - gradeB;
                return a.localeCompare(b, 'km');
            });
            
            console.log(`📚 Total unique classes: ${allClassNamesList.length}`);
            
            const select = document.getElementById('classSelect');
            select.innerHTML = '<option value="">-- ទាំងអស់ --</option>';
            allClassNamesList.forEach(className => {
                select.innerHTML += `<option value="${escapeHtml(className)}">${escapeHtml(className)}</option>`;
            });
            
            displayClassBadges(allClassNamesList);
            
        } catch (error) {
            console.error('Error loading class names:', error);
            document.getElementById('quickClasses').innerHTML = '<div class="text-red-500 text-sm text-center py-4">កំហុសក្នុងការផ្ទុកបញ្ជីថ្នាក់</div>';
        }
    }
    
    function displayClassBadges(classes) {
        const container = document.getElementById('quickClasses');
        if (!container) return;
        
        if (classes.length === 0) {
            container.innerHTML = '<div class="text-gray-400 text-sm text-center py-4">រកមិនឃើញថ្នាក់</div>';
            return;
        }
        
        container.innerHTML = '';
        classes.forEach(className => {
            container.innerHTML += `
                <span class="class-badge" onclick="selectClassAndSearch('${escapeHtml(className)}')">
                    ${escapeHtml(className)}
                </span>
            `;
        });
    }
    
    function filterClasses() {
        const searchText = document.getElementById('classFilterInput')?.value.toLowerCase() || '';
        const filtered = allClassNamesList.filter(className => 
            className.toLowerCase().includes(searchText)
        );
        displayClassBadges(filtered);
    }
    
    function selectClassAndSearch(className) {
        const classSelect = document.getElementById('classSelect');
        if (classSelect) classSelect.value = className;
        const searchName = document.getElementById('searchName');
        if (searchName) searchName.value = '';
        searchStudents();
    }
    
    window.selectClassAndSearch = selectClassAndSearch;
    window.filterClasses = filterClasses;
    
    // ============================================
    // LOAD ALL STUDENTS WITH PAGINATION
    // ============================================
    async function loadAllStudents() {
        showInfoBanner('កំពុងផ្ទុកទិន្នន័យសិស្ស...', false);
        
        try {
            const { count, error: countError } = await supabaseClient
                .from(TABLE_NAME)
                .select('*', { count: 'exact', head: true });
            
            if (countError) throw countError;
            
            const totalStudents = count;
            console.log(`📊 Total students in database: ${totalStudents}`);
            
            if (totalStudents === 0) {
                currentStudents = [];
                displaySearchResults(currentStudents);
                updateSelectedSummary();
                showInfoBanner('មិនទាន់មានទិន្នន័យសិស្សនៅឡើយទេ', false);
                return;
            }
            
            const batchSize = 1000;
            const allData = [];
            
            for (let i = 0; i < totalStudents; i += batchSize) {
                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*')
                    .order('created_at', { ascending: false })
                    .range(i, i + batchSize - 1);
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    allData.push(...data);
                    console.log(`✅ Loaded ${allData.length} of ${totalStudents} students`);
                }
            }
            
            currentStudents = allData;
            displaySearchResults(currentStudents);
            updateSelectedSummary();
            
            showInfoBanner(`✅ បានផ្ទុកសិស្ស ${totalStudents} នាក់ដោយជោគជ័យ!`);
            
        } catch (error) {
            console.error('Error loading students:', error);
            document.getElementById('searchResults').innerHTML = `
                <div class="text-center py-12 text-red-500">
                    <p>❌ កំហុសក្នុងការផ្ទុកទិន្នន័យ: ${error.message}</p>
                </div>
            `;
            showInfoBanner(`❌ កំហុស: ${error.message}`, true);
        }
    }
    
    // ============================================
    // SEARCH STUDENTS WITH CLASS AND NAME FILTERS
    // ============================================
    async function searchStudents() {
        const selectedClass = document.getElementById('classSelect')?.value || '';
        const searchName = document.getElementById('searchName')?.value.trim() || '';
        
        if (!selectedClass && !searchName) {
            loadAllStudents();
            return;
        }
        
        showInfoBanner('កំពុងស្វែងរក...', false);
        
        try {
            let countQuery = supabaseClient.from(TABLE_NAME).select('*', { count: 'exact', head: true });
            
            if (selectedClass) {
                countQuery = countQuery.eq('class', selectedClass);
            }
            if (searchName) {
                countQuery = countQuery.ilike('name', `%${searchName}%`);
            }
            
            const { count, error: countError } = await countQuery;
            if (countError) throw countError;
            
            const totalResults = count;
            console.log(`📊 Search results count: ${totalResults}`);
            
            if (totalResults === 0) {
                currentStudents = [];
                displaySearchResults(currentStudents);
                showInfoBanner('រកមិនឃើញសិស្សដែលត្រូវនឹងលក្ខខណ្ឌស្វែងរក', false);
                return;
            }
            
            const batchSize = 1000;
            const allData = [];
            
            for (let i = 0; i < totalResults; i += batchSize) {
                let query = supabaseClient.from(TABLE_NAME).select('*');
                
                if (selectedClass) {
                    query = query.eq('class', selectedClass);
                }
                if (searchName) {
                    query = query.ilike('name', `%${searchName}%`);
                }
                
                const { data, error } = await query
                    .order('created_at', { ascending: false })
                    .range(i, i + batchSize - 1);
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    allData.push(...data);
                }
            }
            
            currentStudents = allData;
            displaySearchResults(currentStudents);
            showInfoBanner(`✅ រកឃើញសិស្ស ${totalResults} នាក់!`);
            
        } catch (error) {
            console.error('Search error:', error);
            alert('❌ កំហុស: ' + error.message);
            showInfoBanner(`❌ កំហុស: ${error.message}`, true);
        }
    }
    
    // ============================================
    // DISPLAY SEARCH RESULTS - CORRECT TABLE STRUCTURE
    // ============================================
    function displaySearchResults(students) {
        const container = document.getElementById('searchResults');
        
        if (!students || students.length === 0) {
            container.innerHTML = `
                <div class="text-center py-12">
                    <svg class="w-20 h-20 mx-auto text-gray-300 mb-3" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                    </svg>
                    <p class="text-gray-500 text-lg">មិនមានទិន្នន័យសិស្សទេ</p>
                </div>
            `;
            const resultCount = document.getElementById('resultCount');
            if (resultCount) resultCount.innerHTML = '';
            return;
        }
        
        const resultCount = document.getElementById('resultCount');
        if (resultCount) resultCount.innerHTML = `ឃើញ ${students.length} នាក់`;
        
        let tableHtml = `
            <table class="student-table min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-10">
                            <input type="checkbox" id="selectAllCheckbox" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        </th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">លេខសម្គាល់</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ឈ្មោះ</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ភេទ</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ថ្នាក់</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ទូរស័ព្ទ</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">សកម្មភាព</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
        `;
        
        students.forEach(student => {
            const isChecked = selectedStudents.has(student.studentID);
            tableHtml += `
                <tr class="hover:bg-gray-50 transition duration-150">
                    <td class="px-4 py-3 whitespace-nowrap">
                        <input type="checkbox" class="student-checkbox w-4 h-4 text-blue-600 rounded border-gray-300" 
                               value="${student.studentID}" 
                               data-student='${JSON.stringify(student).replace(/'/g, "&#39;")}'
                               ${isChecked ? 'checked' : ''}>
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <span class="text-sm font-mono text-gray-900">${escapeHtml(student.studentID)}</span>
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <span class="text-sm font-medium text-gray-900">${escapeHtml(student.name)}</span>
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <span class="text-sm text-gray-600">${escapeHtml(student.sex) || '-'}</span>
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <span class="inline-flex px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">${escapeHtml(student.class) || '-'}</span>
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <span class="text-sm text-gray-600">${escapeHtml(student.phonenumber) || '-'}</span>
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap text-sm">
                        <button onclick="viewStudent('${student.studentID}')" class="text-blue-600 hover:text-blue-800 transition mx-1" title="មើល">
                            <svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                        <button onclick="toggleSelectStudent('${student.studentID}')" class="${isChecked ? 'text-red-600 hover:text-red-800' : 'text-green-600 hover:text-green-800'} transition mx-1" title="${isChecked ? 'ដកចេញ' : 'ជ្រើសរើស'}">
                            ${isChecked ? 
                                '<svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>' : 
                                '<svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>'
                            }
                        </button>
                    </td>
                </tr>
            `;
        });
        
        tableHtml += `
                </tbody>
            </table>
        `;
        
        container.innerHTML = tableHtml;
        
        // Add event listeners to checkboxes
        document.querySelectorAll('.student-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const studentID = e.target.value;
                if (e.target.checked) {
                    const studentData = JSON.parse(e.target.getAttribute('data-student'));
                    selectedStudents.set(studentID, studentData);
                } else {
                    selectedStudents.delete(studentID);
                }
                updateSelectedCount();
                updateSelectedSummary();
            });
        });
        
        // Handle "Select All" checkbox
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');
        if (selectAllCheckbox) {
            selectAllCheckbox.addEventListener('change', (e) => {
                const isChecked = e.target.checked;
                document.querySelectorAll('.student-checkbox').forEach(checkbox => {
                    checkbox.checked = isChecked;
                    const studentID = checkbox.value;
                    if (isChecked) {
                        const studentData = JSON.parse(checkbox.getAttribute('data-student'));
                        selectedStudents.set(studentID, studentData);
                    } else {
                        selectedStudents.delete(studentID);
                    }
                });
                updateSelectedCount();
                updateSelectedSummary();
            });
        }
        
        updateSelectedCount();
    }
    
    // ============================================
    // UPDATE FUNCTIONS
    // ============================================
    function updateSelectedCount() {
        const count = selectedStudents.size;
        const selectedCountSpan = document.getElementById('selectedCount');
        const finalSelectedCountSpan = document.getElementById('finalSelectedCount');
        if (selectedCountSpan) selectedCountSpan.innerHTML = count;
        if (finalSelectedCountSpan) finalSelectedCountSpan.innerHTML = count;
    }
    
    function updateSelectedSummary() {
        const container = document.getElementById('selectedSummary');
        const students = Array.from(selectedStudents.values());
        
        if (students.length === 0) {
            container.innerHTML = `
                <div class="text-center py-8 text-gray-500">
                    <p>មិនទាន់មានសិស្សដែលបានជ្រើសរើសទេ</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                ${students.map(student => `
                    <div class="flex items-center justify-between bg-gray-50 rounded-lg p-3 hover:bg-gray-100 transition">
                        <div class="flex items-center space-x-3">
                            ${student.photo ? 
                                `<img src="${student.photo}" class="w-10 h-10 rounded-full object-cover">` : 
                                `<div class="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center">
                                    <svg class="w-6 h-6 text-gray-500" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                                    </svg>
                                </div>`
                            }
                            <div>
                                <p class="font-semibold text-sm">${escapeHtml(student.name)}</p>
                                <p class="text-xs text-gray-500">${escapeHtml(student.studentID)} | ${escapeHtml(student.class) || 'N/A'}</p>
                            </div>
                        </div>
                        <button onclick="removeSelectedStudent('${student.studentID}')" class="text-red-600 hover:text-red-800 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    // ============================================
    // GLOBAL FUNCTIONS
    // ============================================
    window.toggleSelectStudent = (studentID) => {
        const student = currentStudents.find(s => s.studentID === studentID);
        if (student) {
            if (selectedStudents.has(studentID)) {
                selectedStudents.delete(studentID);
            } else {
                selectedStudents.set(studentID, student);
            }
            updateSelectedCount();
            updateSelectedSummary();
            displaySearchResults(currentStudents);
        }
    };
    
    window.removeSelectedStudent = (studentID) => {
        selectedStudents.delete(studentID);
        updateSelectedCount();
        updateSelectedSummary();
        displaySearchResults(currentStudents);
    };
    
    window.viewStudent = (studentID) => {
        window.location.href = `create.html?studentID=${studentID}`;
    };
    
    // ============================================
    // BUTTON HANDLERS
    // ============================================
    document.getElementById('selectAllBtn')?.addEventListener('click', () => {
        currentStudents.forEach(student => {
            if (!selectedStudents.has(student.studentID)) {
                selectedStudents.set(student.studentID, student);
            }
        });
        updateSelectedCount();
        updateSelectedSummary();
        displaySearchResults(currentStudents);
    });
    
    document.getElementById('deselectAllBtn')?.addEventListener('click', () => {
        currentStudents.forEach(student => {
            selectedStudents.delete(student.studentID);
        });
        updateSelectedCount();
        updateSelectedSummary();
        displaySearchResults(currentStudents);
    });
    
    document.getElementById('addSelectedBtn')?.addEventListener('click', () => {
        if (selectedStudents.size === 0) {
            alert('សូមជ្រើសរើសសិស្សយ៉ាងហោចណាស់ម្នាក់');
            return;
        }
        
        const selectedArray = Array.from(selectedStudents.values());
        localStorage.setItem('selectedStudents', JSON.stringify(selectedArray));
        alert(`✅ បានរក្សាទុកសិស្ស ${selectedStudents.size} នាក់!`);
    });
    
    document.getElementById('goToGenerateBtn')?.addEventListener('click', () => {
        if (selectedStudents.size === 0) {
            alert('សូមជ្រើសរើសសិស្សយ៉ាងហោចណាស់ម្នាក់');
            return;
        }
        
        const selectedArray = Array.from(selectedStudents.values());
        localStorage.setItem('selectedStudents', JSON.stringify(selectedArray));
        window.location.href = 'generate.html';
    });
    
    document.getElementById('searchBtn')?.addEventListener('click', () => {
        searchStudents();
    });
    
    document.getElementById('resetBtn')?.addEventListener('click', () => {
        const classSelect = document.getElementById('classSelect');
        const searchName = document.getElementById('searchName');
        const classFilter = document.getElementById('classFilterInput');
        if (classSelect) classSelect.value = '';
        if (searchName) searchName.value = '';
        if (classFilter) classFilter.value = '';
        displayClassBadges(allClassNamesList);
        loadAllStudents();
    });
    
    document.getElementById('classSelect')?.addEventListener('change', () => {
        searchStudents();
    });
    
    document.getElementById('classFilterInput')?.addEventListener('input', () => {
        filterClasses();
    });
    
    document.getElementById('searchName')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchStudents();
    });
    
    // ============================================
    // INITIALIZE
    // ============================================
    async function init() {
        await loadClassNames();
        await loadAllStudents();
    }
    
    init();
    </script>
</body>
</html>
