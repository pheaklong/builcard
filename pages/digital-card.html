<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>កាតសិស្សឌីជីថល - Digital Student ID Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/card-style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .digital-card-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        
        .card-wrapper {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4A86E8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .back-btn {
            background: #6b7280;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #4b5563;
            transform: translateY(-2px);
        }
        
        @media (max-width: 480px) {
            .card-wrapper {
                padding: 12px;
            }
            .download-btn, .back-btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="digital-card-container">
        <div id="loadingState" class="loading-spinner">
            <div class="spinner"></div>
            <p class="text-white mt-4 text-lg">កំពុងផ្ទុកទិន្នន័យសិស្ស...</p>
        </div>
        
        <div id="errorState" class="error-message hidden">
            <svg class="w-20 h-20 mx-auto text-red-500 mb-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <h3 class="text-xl font-bold text-gray-800 mb-2">កើតមានបញ្ហា</h3>
            <p id="errorMessage" class="text-gray-600 mb-4">មិនអាចផ្ទុកទិន្នន័យសិស្សបានទេ</p>
            <a href="../index.html" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">← ត្រឡប់ទៅទំព័រដើម</a>
        </div>
        
        <div id="cardState" class="hidden">
            <div class="card-wrapper">
                <div id="studentCardContainer" class="flex justify-center mb-4">
                    <!-- Card will be displayed here -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/card-template.js"></script>
    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://xmowdtwlidnwnxrkrysj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhtb3dkdHdsaWRud254cmtyeXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzI2MDAsImV4cCI6MjA5NjAwODYwMH0.p22ZAL4oRIMVd9xYotVhRcWDICLqVp_LTj_AszA9JAA';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const TABLE_NAME = 'table_student';
        
        // Get student ID from URL parameter
        function getStudentIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }
        
        // Load student data
        async function loadStudentData(studentId) {
            if (!studentId) {
                showError('មិនមានអត្តលេខសិស្សក្នុង URL');
                return false;
            }
            
            try {
                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*')
                    .eq('studentID', studentId)
                    .maybeSingle();
                
                if (error) throw error;
                
                if (!data) {
                    showError(`រកមិនឃើញសិស្សដែលមានអត្តលេខ: ${studentId}`);
                    return false;
                }
                
                return data;
            } catch (error) {
                console.error('Error loading student:', error);
                showError('កំហុសក្នុងការផ្ទុកទិន្នន័យសិស្ស: ' + error.message);
                return false;
            }
        }
        
        // Display card
        function displayCard(studentData) {
            const container = document.getElementById('studentCardContainer');
            if (container && generateCardHTML) {
                container.innerHTML = generateCardHTML(studentData);
            }
        }
        
        // Download card as image
        async function downloadCard() {
            const cardElement = document.querySelector('#studentCardContainer .student-id-card');
            if (!cardElement) {
                alert('មិនមានកាតដើម្បីទាញយក');
                return;
            }
            
            try {
                // Show loading indicator on button
                const downloadBtn = document.getElementById('downloadCardBtn');
                const originalText = downloadBtn.innerHTML;
                downloadBtn.innerHTML = '<div class="spinner-small"></div> កំពុងដំណើរការ...';
                downloadBtn.disabled = true;
                
                // Add small spinner style
                const style = document.createElement('style');
                style.textContent = `
                    .spinner-small {
                        width: 16px;
                        height: 16px;
                        border: 2px solid #f3f3f3;
                        border-top: 2px solid white;
                        border-radius: 50%;
                        animation: spin 0.8s linear infinite;
                        display: inline-block;
                        margin-right: 8px;
                    }
                    @keyframes spin {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }
                    }
                `;
                document.head.appendChild(style);
                
                const canvas = await html2canvas(cardElement, {
                    scale: 3,
                    backgroundColor: null,
                    logging: false,
                    useCORS: true
                });
                
                const link = document.createElement('a');
                const studentId = document.getElementById('studentID')?.value || 
                                  new URLSearchParams(window.location.search).get('id') || 
                                  'student-card';
                link.download = `digital_student_card_${studentId}.png`;
                link.href = canvas.toDataURL();
                link.click();
                
                // Restore button
                downloadBtn.innerHTML = originalText;
                downloadBtn.disabled = false;
                
                // Show success message
                alert('✅ បានទាញយករូបភាពកាតដោយជោគជ័យ!');
            } catch (error) {
                console.error('Download error:', error);
                alert('កើតមានបញ្ហាក្នុងការទាញយករូបភាព: ' + error.message);
                const downloadBtn = document.getElementById('downloadCardBtn');
                if (downloadBtn) {
                    downloadBtn.innerHTML = '📥 ទាញយករូបភាពកាត';
                    downloadBtn.disabled = false;
                }
            }
        }
        
        // Share card
        async function shareCard() {
            const cardElement = document.querySelector('#studentCardContainer .student-id-card');
            if (!cardElement) {
                alert('មិនមានកាតដើម្បីចែករំលែក');
                return;
            }
            
            try {
                const shareBtn = document.getElementById('shareCardBtn');
                shareBtn.innerHTML = 'កំពុងដំណើរការ...';
                shareBtn.disabled = true;
                
                const canvas = await html2canvas(cardElement, {
                    scale: 2,
                    backgroundColor: null,
                    logging: false
                });
                
                // Convert canvas to blob
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'student-card.png', { type: 'image/png' });
                    
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: 'កាតសិស្សឌីជីថល',
                                text: 'នេះជាកាតសិស្សឌីជីថល',
                                files: [file]
                            });
                        } catch (shareError) {
                            if (shareError.name !== 'AbortError') {
                                alert('មិនអាចចែករំលែកបានទេ: ' + shareError.message);
                            }
                        }
                    } else {
                        // Fallback: download instead
                        const link = document.createElement('a');
                        link.download = 'student-card.png';
                        link.href = canvas.toDataURL();
                        link.click();
                        alert('ប្រព័ន្ធរបស់អ្នកមិនគាំទ្រការចែករំលែកទេ។ បានរក្សាទុករូបភាពដោយស្វ័យប្រវត្តិ។');
                    }
                    
                    shareBtn.innerHTML = '📤 ចែករំលែក';
                    shareBtn.disabled = false;
                }, 'image/png');
            } catch (error) {
                console.error('Share error:', error);
                alert('កើតមានបញ្ហាក្នុងការចែករំលែក: ' + error.message);
                const shareBtn = document.getElementById('shareCardBtn');
                if (shareBtn) {
                    shareBtn.innerHTML = '📤 ចែករំលែក';
                    shareBtn.disabled = false;
                }
            }
        }
        
        // Show error state
        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = message;
        }
        
        // Show card state
        function showCardState() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('cardState').classList.remove('hidden');
        }
        
        // Initialize page
        async function init() {
            const studentId = getStudentIdFromUrl();
            console.log('Digital Card - Student ID:', studentId);
            
            if (!studentId) {
                showError('សូមបញ្ចូលអត្តលេខសិស្សតាមរយៈ URL ( ?id=STU-001 )');
                return;
            }
            
            const studentData = await loadStudentData(studentId);
            if (studentData) {
                displayCard(studentData);
                showCardState();
                
                // Update page title with student name
                document.title = `កាតសិស្សឌីជីថល - ${studentData.name || studentId}`;
            }
        }
        
        // Event listeners
        document.getElementById('downloadCardBtn')?.addEventListener('click', downloadCard);
        document.getElementById('shareCardBtn')?.addEventListener('click', shareCard);
        
        // Start
        init();
    </script>
</body>
</html>
