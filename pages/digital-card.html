<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>កាតសិស្សឌីជីថល - Digital Student Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/card-style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .digital-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        
        .card-preview {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading-state {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4A86E8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-state {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
        }
        
        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .btn-back {
            background: #6b7280;
            transition: all 0.3s ease;
        }
        
        .btn-back:hover {
            background: #4b5563;
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 480px) {
            .card-preview {
                padding: 12px;
            }
            .btn-download, .btn-back {
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="digital-container">
        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p class="text-gray-600">កំពុងផ្ទុកទិន្នន័យសិស្ស...</p>
        </div>
        
        <!-- Error State -->
        <div id="errorState" class="error-state hidden">
            <svg class="w-16 h-16 mx-auto text-red-500 mb-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <h3 class="text-xl font-bold text-gray-800 mb-2">កើតមានបញ្ហា</h3>
            <p id="errorMessage" class="text-gray-600 mb-4">មិនអាចផ្ទុកទិន្នន័យសិស្សបានទេ</p>
            <a href="../index.html" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">← ត្រឡប់ទៅដើម</a>
        </div>
        
        <!-- Card State -->
        <div id="cardState" class="hidden">
            <div class="card-preview">
                <div id="studentCardContainer" class="flex justify-center mb-4">
                    <!-- Card will be generated here -->
                </div>
                
                <div class="flex gap-3 mt-4">
                    <button id="downloadCardBtn" class="btn-download flex-1 text-white px-4 py-3 rounded-xl font-medium flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        ទាញយករូបភាព
                    </button>
                    <a href="../index.html" class="btn-back flex-1 text-white px-4 py-3 rounded-xl font-medium flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        ត្រឡប់
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/card-template.js"></script>
    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://xmowdtwlidnwnxrkrysj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhtb3dkdHdsaWRud254cmtyeXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzI2MDAsImV4cCI6MjA5NjAwODYwMH0.p22ZAL4oRIMVd9xYotVhRcWDICLqVp_LTj_AszA9JAA';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const TABLE_NAME = 'table_student';
        
        // Get student ID from URL
        function getStudentId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }
        
        // Load student data
        async function loadStudent() {
            const studentId = getStudentId();
            
            if (!studentId) {
                showError('មិនមានអត្តលេខសិស្សក្នុង URL');
                return null;
            }
            
            try {
                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*')
                    .eq('studentID', studentId)
                    .maybeSingle();
                
                if (error) throw error;
                
                if (!data) {
                    showError(`រកមិនឃើញសិស្សដែលមានអត្តលេខ: ${studentId}`);
                    return null;
                }
                
                return data;
            } catch (error) {
                console.error('Error:', error);
                showError('កំហុសក្នុងការផ្ទុកទិន្នន័យ: ' + error.message);
                return null;
            }
        }
        
        // Display card using generateSmallCardHTML from card-template.js
        function displayCard(student) {
            const container = document.getElementById('studentCardContainer');
            if (container && window.generateSmallCardHTML) {
                container.innerHTML = window.generateSmallCardHTML(student);
            } else {
                console.error('generateSmallCardHTML not available');
            }
        }
        
        // Download card as image
        async function downloadCard() {
            const cardElement = document.querySelector('#studentCardContainer .student-id-card');
            if (!cardElement) {
                alert('មិនមានកាតដើម្បីទាញយក');
                return;
            }
            
            try {
                const btn = document.getElementById('downloadCardBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '⏳ កំពុងដំណើរការ...';
                btn.disabled = true;
                
                const canvas = await html2canvas(cardElement, {
                    scale: 3,
                    backgroundColor: null,
                    logging: false
                });
                
                const link = document.createElement('a');
                const studentId = getStudentId() || 'card';
                link.download = `student_card_${studentId}.png`;
                link.href = canvas.toDataURL();
                link.click();
                
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('✅ បានទាញយកដោយជោគជ័យ!');
            } catch (error) {
                console.error('Download error:', error);
                alert('កើតមានបញ្ហា: ' + error.message);
                const btn = document.getElementById('downloadCardBtn');
                if (btn) {
                    btn.innerHTML = '📥 ទាញយករូបភាព';
                    btn.disabled = false;
                }
            }
        }
        
        // Show error
        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = message;
        }
        
        // Show card
        function showCard() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('cardState').classList.remove('hidden');
        }
        
        // Initialize
        async function init() {
            const student = await loadStudent();
            if (student) {
                displayCard(student);
                showCard();
                document.title = `កាតសិស្ស - ${student.name || student.studentID}`;
            }
        }
        
        // Event listeners
        document.getElementById('downloadCardBtn')?.addEventListener('click', downloadCard);
        
        // Start
        init();
    </script>
</body>
</html>
