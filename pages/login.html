<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ចូលប្រើប្រព័ន្ធ - BUILCARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Khmer', 'Khmer OS Moul Light', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card .logo { text-align: center; font-size: 52px; margin-bottom: 8px; }
        .login-card h1 { font-size: 28px; font-weight: bold; color: #4f46e5; text-align: center; margin-bottom: 4px; }
        .login-card .subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .btn-login:hover { background: #4338ca; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            border-left: 4px solid #991b1b;
        }
        .error-message.show { display: block; animation: shake 0.4s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .test-credentials {
            margin-top: 20px;
            padding: 14px 16px;
            background: #f3f4f6;
            border-radius: 10px;
            font-size: 13px;
            color: #6b7280;
            border: 1px solid #e5e7eb;
        }
        .test-credentials p { margin: 4px 0; }
        .test-credentials strong { color: #374151; }
        .test-credentials .role-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 4px;
        }
        .role-badge.admin { background: #fee2e2; color: #991b1b; }
        .role-badge.teacher { background: #dcfce7; color: #166534; }
        .role-badge.student { background: #dbeafe; color: #1e40af; }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #fff;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .debug-info {
            margin-top: 16px;
            padding: 12px;
            background: #1e293b;
            color: #a5f3fc;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }
        .debug-info.show { display: block; }
        .debug-toggle {
            margin-top: 12px;
            text-align: center;
        }
        .debug-toggle button {
            background: none;
            border: none;
            color: #6b7280;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }
        .debug-toggle button:hover { color: #374151; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-overlay.show { display: flex; }
        .loading-box {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .loading-box .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        .loading-box p { color: #4b5563; font-size: 14px; }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-badge.success { background: #dcfce7; color: #166534; }
        .status-badge.error { background: #fee2e2; color: #991b1b; }
        .status-badge.warning { background: #fef3c7; color: #92400e; }
        .status-badge.info { background: #dbeafe; color: #1e40af; }
        .connection-status {
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            display: none;
        }
        .connection-status.show { display: block; }
        .connection-status.connected { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .connection-status.disconnected { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .connection-status.checking { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <p id="loadingText">កំពុងភ្ជាប់ប្រព័ន្ធ...</p>
            <p id="loadingDetail" style="font-size:12px;color:#9ca3af;margin-top:8px;"></p>
        </div>
    </div>

    <div class="login-card">
        <div class="logo">📚</div>
        <h1>BUILCARD</h1>
        <p class="subtitle">ប្រព័ន្ធគ្រប់គ្រងការសិក្សា</p>

        <!-- Connection Status -->
        <div id="connectionStatus" class="connection-status checking show">
            🔄 កំពុងពិនិត្យការតភ្ជាប់...
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">ឈ្មោះអ្នកប្រើប្រាស់</label>
                <input type="text" id="username" placeholder="បញ្ចូលឈ្មោះអ្នកប្រើប្រាស់" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">ពាក្យសម្ងាត់</label>
                <input type="password" id="password" placeholder="បញ្ចូលពាក្យសម្ងាត់" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">🔐 ចូលប្រើប្រាស់</button>
        </form>

        <div class="test-credentials">
            <p><strong>📝 សម្រាប់សាកល្បង៖</strong></p>
            <p>👑 Admin: <strong>admin</strong> / <strong>admin123</strong> <span class="role-badge admin">Admin</span></p>
            <p style="font-size:12px;color:#9ca3af;margin-top:8px;">
                💡 ប្រសិនបើ Login មិនចូល សូមចុច "បង្ហាញព័ត៌មាន Debug"
            </p>
        </div>

        <div class="debug-toggle">
            <button onclick="toggleDebug()">🔧 បង្ហាញព័ត៌មាន Debug</button>
            <button onclick="testDirectLogin()" style="margin-left:12px;">🧪 សាកល្បង Login ដោយផ្ទាល់</button>
        </div>
        <div id="debugInfo" class="debug-info">
            <div id="debugContent">កំពុងរង់ចាំ...</div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/user-management.js"></script>
    <script>
        // ============================================
        // DEBUG FUNCTIONS
        // ============================================
        
        let debugLogs = [];
        let debugStartTime = Date.now();

        function getTimestamp() {
            const elapsed = ((Date.now() - debugStartTime) / 1000).toFixed(1);
            return `${elapsed}s`;
        }

        function addDebugLog(message, data = null, type = 'info') {
            const timestamp = getTimestamp();
            const log = { timestamp, message, data, type };
            debugLogs.push(log);
            updateDebugDisplay();
            
            // Console log with colors
            const emoji = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
            console.log(`[${timestamp}] ${emoji} ${message}`, data || '');
        }

        function updateDebugDisplay() {
            const container = document.getElementById('debugContent');
            if (!container) return;
            
            const logs = debugLogs.slice(-30).map(log => {
                const colors = {
                    error: '#fca5a5',
                    success: '#86efac',
                    warning: '#fcd34d',
                    info: '#93c5fd'
                };
                const color = colors[log.type] || '#a5f3fc';
                let dataStr = '';
                if (log.data) {
                    try {
                        dataStr = ' ' + JSON.stringify(log.data, null, 2);
                    } catch (e) {
                        dataStr = ' ' + String(log.data);
                    }
                }
                const emoji = log.type === 'error' ? '❌' : log.type === 'success' ? '✅' : log.type === 'warning' ? '⚠️' : 'ℹ️';
                return `<div style="color:${color}">[${log.timestamp}] ${emoji} ${log.message}${dataStr}</div>`;
            }).join('');
            
            container.innerHTML = logs || 'មិនមានទិន្នន័យ';
            // Auto scroll to bottom
            const debugEl = document.getElementById('debugInfo');
            if (debugEl && debugEl.classList.contains('show')) {
                debugEl.scrollTop = debugEl.scrollHeight;
            }
        }

        function toggleDebug() {
            const el = document.getElementById('debugInfo');
            el.classList.toggle('show');
            if (el.classList.contains('show')) {
                updateDebugDisplay();
            }
        }

        // ============================================
        // CONNECTION TEST
        // ============================================

        async function testSupabaseConnection() {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = 'connection-status checking show';
            statusEl.textContent = '🔄 កំពុងពិនិត្យការតភ្ជាប់ទៅ Supabase...';
            addDebugLog('Testing Supabase connection...');

            try {
                // Test 1: Check if SupabaseConfig exists
                if (typeof SupabaseConfig === 'undefined') {
                    statusEl.className = 'connection-status disconnected show';
                    statusEl.textContent = '❌ SupabaseConfig មិនត្រូវបានផ្ទុក';
                    addDebugLog('SupabaseConfig is undefined', null, 'error');
                    return false;
                }
                addDebugLog('✅ SupabaseConfig loaded');

                // Test 2: Direct fetch to Supabase
                addDebugLog('Testing direct fetch to Supabase...');
                const url = 'https://xmodwtwlidnwnxrkrvsj.supabase.co/rest/v1/users?select=count&limit=1';
                const response = await fetch(url, {
                    headers: {
                        'apikey': SupabaseConfig.supabaseKey,
                        'Authorization': `Bearer ${SupabaseConfig.supabaseKey}`
                    }
                });
                
                addDebugLog(`Fetch response status: ${response.status}`, null, response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    const data = await response.json();
                    addDebugLog(`✅ Supabase connection successful!`, { count: data.length }, 'success');
                    statusEl.className = 'connection-status connected show';
                    statusEl.textContent = `✅ តភ្ជាប់ទៅ Supabase បានជោគជ័យ (${data.length} users)`;
                    return true;
                } else {
                    const errorText = await response.text();
                    addDebugLog(`❌ Supabase connection failed: ${response.status}`, { error: errorText }, 'error');
                    statusEl.className = 'connection-status disconnected show';
                    statusEl.textContent = `❌ មិនអាចតភ្ជាប់ទៅ Supabase (${response.status})`;
                    return false;
                }
            } catch (error) {
                addDebugLog(`❌ Connection error: ${error.message}`, null, 'error');
                statusEl.className = 'connection-status disconnected show';
                statusEl.textContent = `❌ កំហុសក្នុងការតភ្ជាប់: ${error.message}`;
                return false;
            }
        }

        // ============================================
        // DIRECT LOGIN TEST
        // ============================================

        async function testDirectLogin() {
            addDebugLog('🧪 Testing direct login...', null, 'info');
            
            try {
                // Get users from localStorage
                const users = JSON.parse(localStorage.getItem('system_users_backup') || '[]');
                addDebugLog(`📋 Users in localStorage: ${users.length}`, users.map(u => ({ username: u.username, role: u.role })), 'info');
                
                // Find admin
                const admin = users.find(u => u.username === 'admin');
                if (!admin) {
                    addDebugLog('❌ Admin not found in localStorage', null, 'error');
                    alert('Admin not found in localStorage!');
                    return;
                }
                addDebugLog('✅ Admin found', { username: admin.username, password: admin.password.substring(0, 10) + '...' }, 'success');
                
                // Hash the password
                const hashed = userManagement.hashPassword('admin123');
                addDebugLog(`🔐 Hashed password: ${hashed}`, null, 'info');
                addDebugLog(`🔐 Stored password: ${admin.password}`, null, 'info');
                addDebugLog(`🔐 Match: ${admin.password === hashed}`, null, admin.password === hashed ? 'success' : 'error');
                
                if (admin.password === hashed) {
                    addDebugLog('✅ Password match! Login should work.', null, 'success');
                    alert('✅ Password is correct! Try logging in with admin/admin123');
                } else {
                    addDebugLog('❌ Password mismatch!', null, 'error');
                    alert('❌ Password mismatch! Please check the password hash.');
                }
            } catch (error) {
                addDebugLog(`❌ Test error: ${error.message}`, null, 'error');
                alert('Error during test: ' + error.message);
            }
        }

        // ============================================
        // WAIT FOR USER MANAGEMENT
        // ============================================

        function waitForUserManagement() {
            return new Promise((resolve) => {
                let attempts = 0;
                const maxAttempts = 50;
                
                addDebugLog('⏳ Waiting for userManagement...', null, 'info');
                
                if (typeof userManagement === 'undefined') {
                    const checkInterval = setInterval(() => {
                        attempts++;
                        if (typeof userManagement !== 'undefined') {
                            clearInterval(checkInterval);
                            addDebugLog('✅ userManagement found', {
                                isInitialized: userManagement.isInitialized,
                                usersCount: userManagement.users?.length || 0
                            }, 'success');
                            resolve();
                        } else if (attempts >= maxAttempts) {
                            clearInterval(checkInterval);
                            addDebugLog('❌ userManagement not found after timeout', null, 'error');
                            resolve();
                        }
                    }, 200);
                } else {
                    addDebugLog('✅ userManagement already loaded', {
                        isInitialized: userManagement.isInitialized,
                        usersCount: userManagement.users?.length || 0
                    }, 'success');
                    resolve();
                }
            });
        }

        // ============================================
        // LOGIN HANDLER
        // ============================================

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');
            const btn = document.getElementById('loginBtn');
            const overlay = document.getElementById('loadingOverlay');

            addDebugLog(`🔄 Login attempt for: ${username}`, null, 'info');

            errorEl.classList.remove('show');
            errorEl.textContent = '';

            if (!username || !password) {
                showError('សូមបញ្ចូលឈ្មោះអ្នកប្រើប្រាស់ និងពាក្យសម្ងាត់');
                addDebugLog('❌ Validation failed: empty fields', null, 'error');
                return;
            }

            overlay.classList.add('show');
            document.getElementById('loadingText').textContent = 'កំពុងចូលប្រើប្រាស់...';
            document.getElementById('loadingDetail').textContent = `អ្នកប្រើប្រាស់: ${username}`;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> កំពុងចូលប្រើ...';

            try {
                // Wait for userManagement
                await waitForUserManagement();

                // Check if userManagement is available
                if (typeof userManagement === 'undefined') {
                    addDebugLog('❌ userManagement is undefined!', null, 'error');
                    showError('ប្រព័ន្ធមិនទាន់ត្រៀមខ្លួន សូមផ្ទុកទំព័រឡើងវិញ');
                    overlay.classList.remove('show');
                    btn.disabled = false;
                    btn.innerHTML = '🔐 ចូលប្រើប្រាស់';
                    return;
                }

                // Check if userManagement is initialized
                if (!userManagement.isInitialized) {
                    addDebugLog('⏳ userManagement not initialized, forcing init...', null, 'warning');
                    await userManagement.init();
                    addDebugLog('✅ userManagement initialized after force', {
                        isInitialized: userManagement.isInitialized,
                        usersCount: userManagement.users?.length || 0
                    }, 'success');
                }

                addDebugLog('📋 UserManagement status', {
                    isInitialized: userManagement.isInitialized,
                    isUsingSupabase: userManagement.isUsingSupabase,
                    usersCount: userManagement.users?.length || 0
                }, 'info');

                // Check if users exist
                if (userManagement.users.length === 0) {
                    addDebugLog('⚠️ No users found, creating default admin...', null, 'warning');
                    await userManagement.createDefaultAdmin();
                    addDebugLog(`✅ Users after creation: ${userManagement.users.length}`, null, 'success');
                }

                // Attempt login
                addDebugLog('🔑 Calling userManagement.login()...', null, 'info');
                const result = await userManagement.login(username, password);
                
                addDebugLog('📩 Login result', {
                    success: result.success,
                    message: result.message,
                    user: result.user ? { username: result.user.username, role: result.user.role } : null
                }, result.success ? 'success' : 'error');
                
                if (result.success) {
                    errorEl.classList.remove('show');
                    const role = result.user.role;
                    const redirectMap = {
                        'admin': 'admin-dashboard.html',
                        'editor': 'editor-dashboard.html',
                        'teacher': 'teacher-dashboard.html',
                        'student': 'student-dashboard.html'
                    };
                    const redirectUrl = redirectMap[role] || 'index.html';
                    
                    addDebugLog(`✅ Login successful! Redirecting to: ${redirectUrl}`, null, 'success');
                    
                    btn.innerHTML = '✅ ចូលប្រើដោយជោគជ័យ!';
                    btn.style.background = '#22c55e';
                    
                    overlay.classList.remove('show');
                    
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 500);
                } else {
                    showError(result.message || 'ឈ្មោះអ្នកប្រើប្រាស់ ឬពាក្យសម្ងាត់មិនត្រឹមត្រូវ');
                    overlay.classList.remove('show');
                    btn.disabled = false;
                    btn.innerHTML = '🔐 ចូលប្រើប្រាស់';
                    btn.style.background = '';
                    document.getElementById('username').focus();
                    document.getElementById('username').select();
                }
            } catch (error) {
                console.error('Login error:', error);
                addDebugLog(`❌ Login exception: ${error.message}`, { stack: error.stack }, 'error');
                showError('មានបញ្ហាក្នុងការចូលប្រើប្រាស់។ សូមព្យាយាមម្តងទៀត។ ' + error.message);
                overlay.classList.remove('show');
                btn.disabled = false;
                btn.innerHTML = '🔐 ចូលប្រើប្រាស់';
                btn.style.background = '';
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            addDebugLog(`❌ Error: ${message}`, null, 'error');
        }

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                const activeElement = document.activeElement;
                if (activeElement && (activeElement.id === 'username' || activeElement.id === 'password')) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });

        // ============================================
        // PAGE LOAD
        // ============================================

        document.addEventListener('DOMContentLoaded', async function() {
            addDebugLog('📄 Page loaded', null, 'info');
            
            // Show loading overlay
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('loadingText').textContent = 'កំពុងផ្ទុកប្រព័ន្ធ...';
            document.getElementById('loadingDetail').textContent = 'សូមមេត្តារង់ចាំ...';

            // Test Supabase connection
            await testSupabaseConnection();

            // Check if userManagement is available
            await waitForUserManagement();

            // Check if userManagement is initialized
            if (typeof userManagement !== 'undefined' && !userManagement.isInitialized) {
                addDebugLog('⏳ Waiting for userManagement to initialize...', null, 'warning');
                let attempts = 0;
                const maxAttempts = 30;
                await new Promise((resolve) => {
                    const checkInterval = setInterval(() => {
                        attempts++;
                        if (userManagement.isInitialized) {
                            clearInterval(checkInterval);
                            addDebugLog('✅ userManagement initialized', {
                                isUsingSupabase: userManagement.isUsingSupabase,
                                usersCount: userManagement.users?.length || 0
                            }, 'success');
                            resolve();
                        } else if (attempts >= maxAttempts) {
                            clearInterval(checkInterval);
                            addDebugLog('⚠️ userManagement not initialized after timeout', null, 'warning');
                            // Force init
                            userManagement.init().then(() => {
                                addDebugLog('✅ userManagement forced init complete', null, 'success');
                                resolve();
                            }).catch(err => {
                                addDebugLog('❌ Force init failed', { error: err.message }, 'error');
                                resolve();
                            });
                        }
                    }, 200);
                });
            }

            // Hide loading overlay
            document.getElementById('loadingOverlay').classList.remove('show');

            // Check if already logged in
            if (typeof userManagement !== 'undefined' && userManagement.isLoggedIn()) {
                const user = userManagement.getCurrentUser();
                addDebugLog(`ℹ️ User already logged in: ${user.username} (${user.role})`, null, 'info');
                const redirectMap = {
                    'admin': 'admin-dashboard.html',
                    'editor': 'editor-dashboard.html',
                    'teacher': 'teacher-dashboard.html',
                    'student': 'student-dashboard.html'
                };
                window.location.href = redirectMap[user.role] || 'index.html';
                return;
            }

            // Show debug info
            addDebugLog('🔓 Ready for login', null, 'success');
            
            // Focus on username field
            document.getElementById('username').focus();

            // Update debug display
            updateDebugDisplay();
        });

        // ============================================
        // MAKE FUNCTIONS GLOBAL
        // ============================================

        window.handleLogin = handleLogin;
        window.toggleDebug = toggleDebug;
        window.addDebugLog = addDebugLog;
        window.waitForUserManagement = waitForUserManagement;
        window.testSupabaseConnection = testSupabaseConnection;
        window.testDirectLogin = testDirectLogin;
    </script>
</body>
</html>
