<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ចូលប្រើប្រព័ន្ធ - BUILCARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Khmer', 'Khmer OS Moul Light', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card .logo { text-align: center; font-size: 52px; margin-bottom: 8px; }
        .login-card h1 { font-size: 28px; font-weight: bold; color: #4f46e5; text-align: center; margin-bottom: 4px; }
        .login-card .subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .btn-login:hover { background: #4338ca; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            border-left: 4px solid #991b1b;
        }
        .error-message.show { display: block; animation: shake 0.4s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .test-credentials {
            margin-top: 20px;
            padding: 14px 16px;
            background: #f3f4f6;
            border-radius: 10px;
            font-size: 13px;
            color: #6b7280;
            border: 1px solid #e5e7eb;
        }
        .test-credentials p { margin: 4px 0; }
        .test-credentials strong { color: #374151; }
        .test-credentials .role-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 4px;
        }
        .role-badge.admin { background: #fee2e2; color: #991b1b; }
        .role-badge.teacher { background: #dcfce7; color: #166534; }
        .role-badge.student { background: #dbeafe; color: #1e40af; }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #fff;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .debug-info {
            margin-top: 16px;
            padding: 12px;
            background: #1e293b;
            color: #a5f3fc;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        .debug-info.show { display: block; }
        .debug-toggle {
            margin-top: 12px;
            text-align: center;
        }
        .debug-toggle button {
            background: none;
            border: none;
            color: #6b7280;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }
        .debug-toggle button:hover { color: #374151; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">📚</div>
        <h1>BUILCARD</h1>
        <p class="subtitle">ប្រព័ន្ធគ្រប់គ្រងការសិក្សា</p>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">ឈ្មោះអ្នកប្រើប្រាស់</label>
                <input type="text" id="username" placeholder="បញ្ចូលឈ្មោះអ្នកប្រើប្រាស់" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">ពាក្យសម្ងាត់</label>
                <input type="password" id="password" placeholder="បញ្ចូលពាក្យសម្ងាត់" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">🔐 ចូលប្រើប្រាស់</button>
        </form>

        <div class="test-credentials">
            <p><strong>📝 សម្រាប់សាកល្បង៖</strong></p>
            <p>👑 Admin: <strong>admin</strong> / <strong>admin123</strong> <span class="role-badge admin">Admin</span></p>
        </div>

        <div class="debug-toggle">
            <button onclick="toggleDebug()">🔧 បង្ហាញព័ត៌មាន Debug</button>
        </div>
        <div id="debugInfo" class="debug-info">
            <div id="debugContent">កំពុងរង់ចាំ...</div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/user-management.js"></script>
    <script>
        // ============================================
        // DEBUG FUNCTIONS
        // ============================================
        
        let debugLogs = [];

        function addDebugLog(message, data = null) {
            const timestamp = new Date().toLocaleTimeString();
            const log = { timestamp, message, data };
            debugLogs.push(log);
            updateDebugDisplay();
            console.log(`[${timestamp}] ${message}`, data || '');
        }

        function updateDebugDisplay() {
            const container = document.getElementById('debugContent');
            if (!container) return;
            
            const logs = debugLogs.slice(-20).map(log => {
                let dataStr = '';
                if (log.data) {
                    try {
                        dataStr = ' ' + JSON.stringify(log.data, null, 2);
                    } catch (e) {
                        dataStr = ' ' + String(log.data);
                    }
                }
                return `<div>${log.timestamp} - ${log.message}${dataStr}</div>`;
            }).join('');
            
            container.innerHTML = logs || 'មិនមានទិន្នន័យ';
        }

        function toggleDebug() {
            const el = document.getElementById('debugInfo');
            el.classList.toggle('show');
            if (el.classList.contains('show')) {
                updateDebugDisplay();
            }
        }

        // ============================================
        // LOGIN HANDLER
        // ============================================

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');
            const btn = document.getElementById('loginBtn');

            addDebugLog('🔄 ចាប់ផ្ដើម Login', { username });

            // Reset error
            errorEl.classList.remove('show');
            errorEl.textContent = '';

            // Validate
            if (!username || !password) {
                showError('សូមបញ្ចូលឈ្មោះអ្នកប្រើប្រាស់ និងពាក្យសម្ងាត់');
                addDebugLog('❌ Validation failed: empty fields');
                return;
            }

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> កំពុងចូលប្រើ...';

            try {
                // Check if userManagement is available
                if (typeof userManagement === 'undefined') {
                    addDebugLog('❌ userManagement is undefined!');
                    showError('ប្រព័ន្ធមិនទាន់ត្រៀមខ្លួន សូមផ្ទុកទំព័រឡើងវិញ');
                    btn.disabled = false;
                    btn.innerHTML = '🔐 ចូលប្រើប្រាស់';
                    return;
                }

                addDebugLog('✅ userManagement found', { 
                    isInitialized: userManagement.isInitialized,
                    isUsingSupabase: userManagement.isUsingSupabase,
                    usersCount: userManagement.users?.length || 0
                });

                // Check Supabase connection
                if (typeof SupabaseConfig !== 'undefined') {
                    addDebugLog('🔄 Checking Supabase connection...');
                    const connected = await SupabaseConfig.checkConnection();
                    addDebugLog(`📡 Supabase connection: ${connected ? '✅ Success' : '❌ Failed'}`);
                    
                    if (connected) {
                        // Try to get users
                        const users = await SupabaseConfig.getAllUsers();
                        addDebugLog(`📋 Users in Supabase: ${users?.length || 0}`);
                    }
                }

                // Attempt login
                addDebugLog('🔑 Attempting login...');
                const result = await userManagement.login(username, password);
                
                addDebugLog('📩 Login result', { 
                    success: result.success,
                    user: result.user ? { username: result.user.username, role: result.user.role } : null,
                    message: result.message
                });
                
                if (result.success) {
                    errorEl.classList.remove('show');
                    const role = result.user.role;
                    const redirectMap = {
                        'admin': 'admin-dashboard.html',
                        'editor': 'editor-dashboard.html',
                        'teacher': 'teacher-dashboard.html',
                        'student': 'student-dashboard.html'
                    };
                    const redirectUrl = redirectMap[role] || 'index.html';
                    
                    addDebugLog(`✅ Login successful! Redirecting to: ${redirectUrl}`);
                    
                    btn.innerHTML = '✅ ចូលប្រើដោយជោគជ័យ!';
                    btn.style.background = '#22c55e';
                    
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 500);
                } else {
                    showError(result.message || 'ឈ្មោះអ្នកប្រើប្រាស់ ឬពាក្យសម្ងាត់មិនត្រឹមត្រូវ');
                    btn.disabled = false;
                    btn.innerHTML = '🔐 ចូលប្រើប្រាស់';
                    btn.style.background = '';
                    document.getElementById('username').focus();
                    document.getElementById('username').select();
                }
            } catch (error) {
                console.error('Login error:', error);
                addDebugLog('❌ Login exception', { 
                    message: error.message,
                    stack: error.stack 
                });
                showError('មានបញ្ហាក្នុងការចូលប្រើប្រាស់។ សូមព្យាយាមម្តងទៀត។ ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '🔐 ចូលប្រើប្រាស់';
                btn.style.background = '';
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            addDebugLog(`❌ Error: ${message}`);
        }

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                const activeElement = document.activeElement;
                if (activeElement && (activeElement.id === 'username' || activeElement.id === 'password')) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });

        // ============================================
        // PAGE LOAD
        // ============================================

        document.addEventListener('DOMContentLoaded', function() {
            addDebugLog('📄 Page loaded');
            
            // Check if userManagement is available
            if (typeof userManagement !== 'undefined') {
                addDebugLog('✅ userManagement loaded', { 
                    isInitialized: userManagement.isInitialized,
                    isUsingSupabase: userManagement.isUsingSupabase 
                });
            } else {
                addDebugLog('⚠️ userManagement not loaded yet, waiting...');
                // Wait for userManagement
                let attempts = 0;
                const checkInterval = setInterval(() => {
                    attempts++;
                    if (typeof userManagement !== 'undefined') {
                        clearInterval(checkInterval);
                        addDebugLog('✅ userManagement loaded (delayed)', { 
                            isInitialized: userManagement.isInitialized,
                            isUsingSupabase: userManagement.isUsingSupabase 
                        });
                    } else if (attempts > 20) {
                        clearInterval(checkInterval);
                        addDebugLog('❌ userManagement not loaded after 20 attempts');
                    }
                }, 200);
            }
            
            // Check if already logged in
            if (typeof userManagement !== 'undefined' && userManagement.isLoggedIn()) {
                const user = userManagement.getCurrentUser();
                addDebugLog('ℹ️ User already logged in', { username: user.username, role: user.role });
                const redirectMap = {
                    'admin': 'admin-dashboard.html',
                    'editor': 'editor-dashboard.html',
                    'teacher': 'teacher-dashboard.html',
                    'student': 'student-dashboard.html'
                };
                window.location.href = redirectMap[user.role] || 'index.html';
                return;
            }
            
            // Focus on username field
            document.getElementById('username').focus();
        });

        // ============================================
        // MAKE FUNCTIONS GLOBAL
        // ============================================

        window.handleLogin = handleLogin;
        window.toggleDebug = toggleDebug;
        window.addDebugLog = addDebugLog;
    </script>
</body>
</html>
