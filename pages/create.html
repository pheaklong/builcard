<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បង្កើតកាតសិស្ស - Create Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/card-style.css">
    <!-- QR Code Library for high quality printing -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        canvas {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        * { font-family: 'Khmer', 'Moul', 'Arial', sans-serif; }
        .card-preview { transition: all 0.3s ease; }
        @media print { .no-print { display: none; } }
        
        /* Camera popup styles */
        #cameraModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #cameraModal.active {
            display: flex;
        }
        #cameraModal .modal-content {
            background: white;
            border-radius: 16px;
            padding: 20px;
            max-width: 500px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        #cameraModal video {
            width: 100%;
            border-radius: 8px;
            background: #1a1a2e;
        }
        #cameraModal canvas {
            display: none;
        }
        .camera-btn {
            transition: all 0.3s ease;
        }
        .camera-btn:hover {
            transform: scale(1.05);
        }
        #capturedPhotoPreview {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #d97706;
        }
        .photo-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>

    <script src="../js/auth.js"></script>
    <script>
        // Protect page
        if (typeof window.protectPage !== 'undefined') {
            window.protectPage();
        }
        
        // Display username if element exists
        const user = window.getCurrentUser ? window.getCurrentUser() : null;
        if (user && document.getElementById('username')) {
            document.getElementById('username').innerText = user.username;
        }
    </script>
</head>
<body class="bg-gradient-to-br from-amber-100 to-yellow-100">
    <div class="container mx-auto px-4 py-8">
        <div class="mb-4 no-print">
            <a href="../index.html" class="text-amber-800 hover:text-amber-600">← ត្រឡប់ទៅមេនុយ</a>
        </div>
        
        <h1 class="text-3xl font-bold text-center mb-8 text-amber-900">🪪 បង្កើតកាតសិស្ស</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Form Section -->
            <div class="bg-white rounded-lg shadow-lg p-6 no-print border-2 border-amber-300">
                <h2 class="text-xl font-bold mb-4 text-amber-800">📝 បញ្ចូលព័ត៌មានសិស្ស</h2>
                
                <form id="studentForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">រូបថតសិស្ស</label>
                        <div class="flex items-center space-x-4">
                            <div class="w-24 h-24 bg-gray-200 rounded-full overflow-hidden flex items-center justify-center border-2 border-amber-600" id="photoPreviewContainer">
                                <img id="photoPreview" src="" alt="Preview" class="w-full h-full object-cover hidden">
                                <svg id="defaultPhotoIcon" class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                                </svg>
                            </div>
                            <div class="flex-1 space-y-2">
                                <div class="flex flex-wrap gap-2">
                                    <input type="file" id="photo" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100">
                                </div>
                                <button type="button" id="openCameraBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 camera-btn text-sm w-full">
                                    📷 ថតរូបដោយកាមេរ៉ា
                                </button>
                            </div>
                        </div>
                        <div id="photoSizeInfo" class="text-xs text-gray-500 mt-1 hidden"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">អត្តលេខសម្គាល់ (ID)</label><input type="text" id="studentID" required class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">គោត្តនាម នាម</label><input type="text" id="name" required class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">ភេទ</label><select id="sex" class="mt-1 block w-full rounded-md border p-2"><option value="ប្រុស">ប្រុស</option><option value="ស្រី">ស្រី</option></select></div>
                        <div><label class="block text-sm font-medium text-gray-700">ថ្ងៃខែឆ្នាំកំណើត</label><input type="date" id="date_of_birth" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">លេខទូរស័ព្ទ</label><input type="tel" id="phonenumber" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">ថ្នាក់</label><input type="text" id="class" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div><label class="block text-sm font-medium text-gray-700">ទីកន្លែងកំណើត / អាសយដ្ឋាន</label><input type="text" id="address" class="mt-1 block w-full rounded-md border p-2"></div>
                    
                    <hr class="my-4 border-amber-300">
                    <h3 class="font-bold text-amber-800">👨‍👩 ព័ត៌មានមាតាបិតា</h3>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">ព្រះបិតា (ឪពុក)</label><input type="text" id="fathername" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">លេខទូរស័ព្ទ</label><input type="tel" id="fatherphone" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">មុខរបរ</label><input type="text" id="fatherjob" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">ព្រះមាតា (ម្តាយ)</label><input type="text" id="mothername" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">លេខទូរស័ព្ទ</label><input type="tel" id="motherphone" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">មុខរបរ</label><input type="text" id="motherjob" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="flex space-x-4 mt-6">
                        <button type="button" id="saveBtn" class="bg-amber-700 text-white px-6 py-2 rounded-lg hover:bg-amber-800">💾 រក្សាទុក និងបង្កើតកាត</button>
                    </div>
                </form>
                
                <div class="mt-6">
                    <label class="block text-sm font-medium text-gray-700">ស្វែងរកតាមអត្តលេខ (ID)</label>
                    <div class="flex space-x-2">
                        <input type="text" id="searchStudentID" class="flex-1 rounded-md border p-2" placeholder="បញ្ចូល Student ID...">
                        <button id="fetchStudentBtn" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700">🔍 ស្វែងរក</button>
                    </div>
                </div>
            </div>
            
            <!-- Card Preview Section -->
            <div class="bg-white rounded-lg shadow-lg p-6 border-2 border-amber-300">
                <h2 class="text-xl font-bold mb-4 text-amber-800">🪪 កាតសិស្ស</h2>
                <div id="studentCard" class="card-preview flex justify-center">
                    <div class="text-gray-400 text-center py-10">
                        <svg class="w-16 h-16 mx-auto mb-2" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2H4zm0 2h12v8H4V6z"/></svg>
                        <p>បំពេញព័ត៌មានសិស្ស ឬស្វែងរក</p>
                    </div>
                </div>
                <div class="mt-4 flex space-x-2 no-print">
                    <button id="printCard" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">🖨️ បោះពុម្ពកាត</button>
                    <button id="downloadCard" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">📥 ទាញយកជារូបភាព</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">📷 ថតរូបដោយកាមេរ៉ា</h3>
                <button id="closeCameraBtn" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <div class="relative">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
            <div class="mt-4 flex flex-col items-center">
                <div id="capturedPhotoContainer" class="hidden mb-3">
                    <p class="text-sm text-gray-600 mb-2">រូបភាពដែលបានថត៖</p>
                    <img id="capturedPhotoPreview" src="" alt="Captured">
                    <div class="photo-actions mt-3">
                        <button id="retakePhotoBtn" class="bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600 camera-btn">🔄 ថតម្តងទៀត</button>
                        <button id="confirmPhotoBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 camera-btn">✅ យល់ព្រម</button>
                    </div>
                </div>
                <button id="captureBtn" class="bg-red-600 text-white px-8 py-3 rounded-full hover:bg-red-700 camera-btn text-lg">
                    📸 ថត
                </button>
                <p class="text-xs text-gray-500 mt-2">រូបភាពនឹងត្រូវបានបង្រួមទំហំ 4x6 និងមិនលើស 50KB</p>
            </div>
        </div>
    </div>
    
    <script src="../js/card-template.js"></script>
    <script src="create-card.js"></script>
</body>
</html>
