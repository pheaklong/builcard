<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បង្កើតកាតសិស្ស - Create Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/card-style.css">
    <!-- QR Code Library for high quality printing -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<style>
        canvas {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
​
        * { font-family: 'Khmer', 'Moul', 'Arial', sans-serif; }
        .card-preview { transition: all 0.3s ease; }
        @media print { .no-print { display: none; } }
    </style>

    <script src="js/auth.js"></script>
    <script>
        // Protect this page
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body class="bg-gradient-to-br from-amber-100 to-yellow-100">
    <div class="container mx-auto px-4 py-8">
        <div class="mb-4 no-print">
            <a href="../index.html" class="text-amber-800 hover:text-amber-600">← ត្រឡប់ទៅមេនុយ</a>
        </div>
        
        <h1 class="text-3xl font-bold text-center mb-8 text-amber-900">🪪 បង្កើតកាតសិស្ស</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Form Section -->
            <div class="bg-white rounded-lg shadow-lg p-6 no-print border-2 border-amber-300">
                <h2 class="text-xl font-bold mb-4 text-amber-800">📝 បញ្ចូលព័ត៌មានសិស្ស</h2>
                
                <form id="studentForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">រូបថតសិស្ស</label>
                        <div class="flex items-center space-x-4">
                            <div class="w-24 h-24 bg-gray-200 rounded-full overflow-hidden flex items-center justify-center border-2 border-amber-600" id="photoPreviewContainer">
                                <img id="photoPreview" src="" alt="Preview" class="w-full h-full object-cover hidden">
                                <svg id="defaultPhotoIcon" class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <input type="file" id="photo" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100">
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">អត្តលេខសម្គាល់ (ID)</label><input type="text" id="studentID" required class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">គោត្តនាម នាម</label><input type="text" id="name" required class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">ភេទ</label><select id="sex" class="mt-1 block w-full rounded-md border p-2"><option value="ប្រុស">ប្រុស</option><option value="ស្រី">ស្រី</option></select></div>
                        <div><label class="block text-sm font-medium text-gray-700">ថ្ងៃខែឆ្នាំកំណើត</label><input type="date" id="date_of_birth" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">លេខទូរស័ព្ទ</label><input type="tel" id="phonenumber" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">ថ្នាក់</label><input type="text" id="class" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div><label class="block text-sm font-medium text-gray-700">ទីកន្លែងកំណើត / អាសយដ្ឋាន</label><input type="text" id="address" class="mt-1 block w-full rounded-md border p-2"></div>
                    
                    <hr class="my-4 border-amber-300">
                    <h3 class="font-bold text-amber-800">👨‍👩 ព័ត៌មានមាតាបិតា</h3>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">ព្រះបិតា (ឪពុក)</label><input type="text" id="fathername" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">លេខទូរស័ព្ទ</label><input type="tel" id="fatherphone" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">មុខរបរ</label><input type="text" id="fatherjob" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">ព្រះមាតា (ម្តាយ)</label><input type="text" id="mothername" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">លេខទូរស័ព្ទ</label><input type="tel" id="motherphone" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">មុខរបរ</label><input type="text" id="motherjob" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="flex space-x-4 mt-6">
                        <button type="button" id="saveBtn" class="bg-amber-700 text-white px-6 py-2 rounded-lg hover:bg-amber-800">💾 រក្សាទុក និងបង្កើតកាត</button>
                    </div>
                </form>
                
                <div class="mt-6">
                    <label class="block text-sm font-medium text-gray-700">ស្វែងរកតាមអត្តលេខ (ID)</label>
                    <div class="flex space-x-2">
                        <input type="text" id="searchStudentID" class="flex-1 rounded-md border p-2" placeholder="បញ្ចូល Student ID...">
                        <button id="fetchStudentBtn" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700">🔍 ស្វែងរក</button>
                    </div>
                </div>
            </div>
            
            <!-- Card Preview Section -->
            <div class="bg-white rounded-lg shadow-lg p-6 border-2 border-amber-300">
                <h2 class="text-xl font-bold mb-4 text-amber-800">🪪 កាតសិស្ស</h2>
                <div id="studentCard" class="card-preview flex justify-center">
                    <div class="text-gray-400 text-center py-10">
                        <svg class="w-16 h-16 mx-auto mb-2" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2H4zm0 2h12v8H4V6z"/></svg>
                        <p>បំពេញព័ត៌មានសិស្ស ឬស្វែងរក</p>
                    </div>
                </div>
                <div class="mt-4 flex space-x-2 no-print">
                    <button id="printCard" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">🖨️ បោះពុម្ពកាត</button>
                    <button id="downloadCard" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">📥 ទាញយកជារូបភាព</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/card-template.js"></script>
    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://xmowdtwlidnwnxrkrysj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhtb3dkdHdsaWRud254cmtyeXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzI2MDAsImV4cCI6MjA5NjAwODYwMH0.p22ZAL4oRIMVd9xYotVhRcWDICLqVp_LTj_AszA9JAA';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const TABLE_NAME = 'table_student';
        let currentPhotoBase64 = null;
        
        // ============================================
        // GET URL PARAMETERS
        // ============================================
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // ============================================
        // LOAD STUDENT FROM URL PARAMETER
        // ============================================
        async function loadStudentFromUrl() {
            const studentID = getUrlParameter('studentID');
            if (studentID) {
                console.log('Loading student from URL:', studentID);
                document.getElementById('searchStudentID').value = studentID;
                await searchStudentById(studentID);
            }
        }
        
        // ============================================
        // SEARCH STUDENT BY ID
        // ============================================
        async function searchStudentById(studentID) {
            try {
                console.log('Searching for student:', studentID);
                
                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*')
                    .eq('studentID', studentID)
                    .maybeSingle();
                
                if (error) {
                    console.error('Search error:', error);
                    alert('❌ កំហុស: ' + error.message);
                    return false;
                }
                
                if (!data) {
                    alert('❌ រកមិនឃើញសិស្សទេ!');
                    return false;
                }
                
                console.log('Found student:', data.name);
                
                // Fill form
                document.getElementById('studentID').value = data.studentID || '';
                document.getElementById('name').value = data.name || '';
                document.getElementById('sex').value = data.sex || 'ប្រុស';
                document.getElementById('date_of_birth').value = data.date_of_birth || '';
                document.getElementById('phonenumber').value = data.phonenumber || '';
                document.getElementById('address').value = data.address || '';
                document.getElementById('fathername').value = data.fathername || '';
                document.getElementById('fatherphone').value = data.fatherphone || '';
                document.getElementById('fatherjob').value = data.fatherjob || '';
                document.getElementById('mothername').value = data.mothername || '';
                document.getElementById('motherphone').value = data.motherphone || '';
                document.getElementById('motherjob').value = data.motherjob || '';
                document.getElementById('class').value = data.class || '';
                
                // Handle photo
                if (data.photo && data.photo !== 'null') {
                    currentPhotoBase64 = data.photo;
                    const preview = document.getElementById('photoPreview');
                    const defaultIcon = document.getElementById('defaultPhotoIcon');
                    if (preview) {
                        preview.src = currentPhotoBase64;
                        preview.classList.remove('hidden');
                    }
                    if (defaultIcon) {
                        defaultIcon.classList.add('hidden');
                    }
                } else {
                    resetPhotoPreview();
                }
                
                // Display card
                displayCard(data);
                return true;
                
            } catch (error) {
                console.error('Search error:', error);
                alert('❌ កំហុស: ' + error.message);
                return false;
            }
        }
        
        // ============================================
        // PHOTO HANDLING
        // ============================================
        function resetPhotoPreview() {
            currentPhotoBase64 = null;
            const preview = document.getElementById('photoPreview');
            const defaultIcon = document.getElementById('defaultPhotoIcon');
            if (preview) {
                preview.src = '';
                preview.classList.add('hidden');
            }
            if (defaultIcon) {
                defaultIcon.classList.remove('hidden');
            }
        }
        
        document.getElementById('photo')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentPhotoBase64 = event.target.result;
                    const preview = document.getElementById('photoPreview');
                    const defaultIcon = document.getElementById('defaultPhotoIcon');
                    preview.src = currentPhotoBase64;
                    preview.classList.remove('hidden');
                    defaultIcon.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            } else {
                resetPhotoPreview();
            }
        });
        
        // ============================================
        // CARD DISPLAY
        // ============================================
        function displayCard(data) {
            const cardContainer = document.getElementById('studentCard');
            if (cardContainer) {
                cardContainer.innerHTML = generateCardHTML(data);
            }
        }
        
        // ============================================
        // SAVE STUDENT
        // ============================================
        async function saveStudent() {
            try {
                const studentData = {
                    studentID: document.getElementById('studentID').value.trim(),
                    name: document.getElementById('name').value.trim(),
                    sex: document.getElementById('sex').value,
                    date_of_birth: document.getElementById('date_of_birth').value || null,
                    phonenumber: document.getElementById('phonenumber').value.trim(),
                    address: document.getElementById('address').value.trim(),
                    fathername: document.getElementById('fathername').value.trim(),
                    fatherphone: document.getElementById('fatherphone').value.trim(),
                    fatherjob: document.getElementById('fatherjob').value.trim(),
                    mothername: document.getElementById('mothername').value.trim(),
                    motherphone: document.getElementById('motherphone').value.trim(),
                    motherjob: document.getElementById('motherjob').value.trim(),
                    class: document.getElementById('class').value.trim(),
                    photo: currentPhotoBase64 || null
                };
                
                if (!studentData.studentID) {
                    alert('សូមបញ្ចូល Student ID');
                    return;
                }
                if (!studentData.name) {
                    alert('សូមបញ្ចូលឈ្មោះសិស្ស');
                    return;
                }
                
                const { data: existing, error: findError } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*')
                    .eq('studentID', studentData.studentID)
                    .maybeSingle();
                
                let result;
                if (existing) {
                    result = await supabaseClient
                        .from(TABLE_NAME)
                        .update(studentData)
                        .eq('studentID', studentData.studentID);
                    if (!result.error) {
                        alert('✅ បានកែប្រែព័ត៌មានសិស្សដោយជោគជ័យ!');
                        displayCard(studentData);
                    } else {
                        alert('❌ កំហុស: ' + result.error.message);
                    }
                } else {
                    result = await supabaseClient
                        .from(TABLE_NAME)
                        .insert([studentData]);
                    if (!result.error) {
                        alert('✅ បានរក្សាទុកព័ត៌មានសិស្សដោយជោគជ័យ!');
                        displayCard(studentData);
                    } else {
                        alert('❌ កំហុស: ' + result.error.message);
                    }
                }
            } catch (error) {
                console.error('Save error:', error);
                alert('❌ កំហុសប្រព័ន្ធ: ' + error.message);
            }
        }
        
        // ============================================
        // SEARCH STUDENT FROM INPUT
        // ============================================
        async function searchStudentFromInput() {
            const studentID = document.getElementById('searchStudentID').value.trim();
            if (!studentID) {
                alert('សូមបញ្ចូល Student ID');
                return;
            }
            await searchStudentById(studentID);
        }
        
        // ============================================
        // PRINT CARD
        // ============================================
        function printCard() {
            const cardContent = document.getElementById('studentCard').innerHTML;
            if (!cardContent || cardContent.includes('បំពេញព័ត៌មានសិស្ស')) {
                alert('មិនមានកាតដើម្បីបោះពុម្ពទេ');
                return;
            }
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                    <head>
                        <title>បោះពុម្ពកាតសិស្ស</title>
                        <meta charset="UTF-8">
                        <style>body{display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;}</style>
                    </head>
                    <body>${cardContent}</body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
        
        // ============================================
        // DOWNLOAD CARD
        // ============================================
        async function downloadCard() {
            const cardElement = document.querySelector('#studentCard > div');
            if (!cardElement || (cardElement.innerHTML && cardElement.innerHTML.includes('បំពេញព័ត៌មានសិស្ស'))) {
                alert('មិនមានកាតដើម្បីទាញយកទេ');
                return;
            }
            try {
                const canvas = await html2canvas(cardElement, { scale: 2, backgroundColor: null });
                const link = document.createElement('a');
                const studentID = document.getElementById('studentID').value || 'card';
                link.download = `student_card_${studentID}.png`;
                link.href = canvas.toDataURL();
                link.click();
                alert('✅ បានទាញយកដោយជោគជ័យ!');
            } catch (error) {
                alert('កើតមានបញ្ហា: ' + error.message);
            }
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('saveBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            saveStudent();
        });
        
        document.getElementById('fetchStudentBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            searchStudentFromInput();
        });
        
        document.getElementById('printCard')?.addEventListener('click', (e) => {
            e.preventDefault();
            printCard();
        });
        
        document.getElementById('downloadCard')?.addEventListener('click', (e) => {
            e.preventDefault();
            downloadCard();
        });
        
        // ============================================
        // INITIALIZE
        // ============================================
        // Load student from URL parameter when page loads
        loadStudentFromUrl();
    </script>
</body>
</html>
