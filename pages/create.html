<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បង្កើតកាតសិស្ស - Create Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="mb-4 no-print">
            <a href="../index.html" class="text-blue-600 hover:text-blue-800">← ត្រឡប់ទៅមេនុយ</a>
        </div>
        
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-600">🪪 បង្កើតកាតសិស្ស</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Form Section -->
            <div class="bg-white rounded-lg shadow-lg p-6 no-print">
                <h2 class="text-xl font-bold mb-4 text-gray-700">📝 បញ្ចូលព័ត៌មានសិស្ស</h2>
                
                <form id="studentForm" class="space-y-4">
                    <!-- Photo Upload -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">រូបថតសិស្ស</label>
                        <div class="flex items-center space-x-4">
                            <div class="w-24 h-24 bg-gray-200 rounded-full overflow-hidden flex items-center justify-center" id="photoPreviewContainer">
                                <img id="photoPreview" src="" alt="Preview" class="w-full h-full object-cover hidden">
                                <svg id="defaultPhotoIcon" class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <input type="file" id="photo" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">Student ID</label><input type="text" id="studentID" required class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">ឈ្មោះសិស្ស</label><input type="text" id="name" required class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">ភេទ</label><select id="sex" class="mt-1 block w-full rounded-md border p-2"><option value="ប្រុស">ប្រុស</option><option value="ស្រី">ស្រី</option></select></div>
                        <div><label class="block text-sm font-medium text-gray-700">ថ្ងៃខែឆ្នាំកំណើត</label><input type="date" id="date_of_birth" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">លេខទូរស័ព្ទ</label><input type="tel" id="phonenumber" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">ថ្នាក់</label><input type="text" id="class" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div><label class="block text-sm font-medium text-gray-700">អាសយដ្ឋាន</label><input type="text" id="address" class="mt-1 block w-full rounded-md border p-2"></div>
                    
                    <hr class="my-4">
                    <h3 class="font-bold text-gray-700">👨‍👩 ព័ត៌មានមាតាបិតា</h3>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">ឈ្មោះឪពុក</label><input type="text" id="fathername" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">លេខទូរស័ព្ទឪពុក</label><input type="tel" id="fatherphone" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">មុខរបរឪពុក</label><input type="text" id="fatherjob" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">ឈ្មោះម្តាយ</label><input type="text" id="mothername" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">លេខទូរស័ព្ទម្តាយ</label><input type="tel" id="motherphone" class="mt-1 block w-full rounded-md border p-2"></div>
                        <div><label class="block text-sm font-medium text-gray-700">មុខរបរម្តាយ</label><input type="text" id="motherjob" class="mt-1 block w-full rounded-md border p-2"></div>
                    </div>
                    
                    <div class="flex space-x-4 mt-6">
                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">💾 រក្សាទុក និងបង្កើតកាត</button>
                    </div>
                </form>
                
                <div class="mt-6">
                    <label class="block text-sm font-medium text-gray-700">ស្វែងរកតាម Student ID</label>
                    <div class="flex space-x-2">
                        <input type="text" id="searchStudentID" class="flex-1 rounded-md border p-2" placeholder="បញ្ចូល Student ID...">
                        <button id="fetchStudentBtn" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700">🔍 ស្វែងរក</button>
                    </div>
                </div>
            </div>
            
            <!-- Card Preview Section -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-bold mb-4 text-gray-700">🪪 កាតសិស្ស</h2>
                <div id="studentCard" class="card-preview flex justify-center">
                    <div class="text-gray-400 text-center py-10">
                        <svg class="w-16 h-16 mx-auto mb-2" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2H4zm0 2h12v8H4V6z"/></svg>
                        <p>បំពេញព័ត៌មានសិស្ស ឬស្វែងរក</p>
                    </div>
                </div>
                <div class="mt-4 flex space-x-2 no-print">
                    <button id="printCard" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">🖨️ បោះពុម្ពកាត</button>
                    <button id="downloadCard" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">📥 ទាញយកជារូបភាព</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/create-card.js"></script>
</body>
</html>
