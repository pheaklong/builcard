<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>កែសម្រួលកាតសិស្ស - Card Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Khmer', 'Khmer OS Moul Light', sans-serif; }
        .preview-card {
            position: sticky;
            top: 20px;
        }
        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .slider-value {
            display: inline-block;
            width: 40px;
            text-align: center;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="mb-4">
            <a href="../index.html" class="text-blue-600 hover:text-blue-800">← ត្រឡប់ទៅមេនុយ</a>
            <a href="create.html" class="text-green-600 hover:text-green-800 ml-4">← ត្រឡប់ទៅបង្កើតកាត</a>
        </div>
        
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-600">🎨 កែសម្រួលទម្រង់កាតសិស្ស</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left Panel: Controls -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-bold mb-4 text-gray-700">⚙️ ការកំណត់ទូទៅ</h2>
                
                <!-- Font Settings -->
                <div class="mb-6 border-b pb-4">
                    <h3 class="font-bold text-gray-700 mb-3">📝 ពុម្ពអក្សរ (Font)</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600">ប្រភេទពុម្ពអក្សរ</label>
                            <select id="fontFamily" class="w-full border rounded p-2 mt-1">
                                <option value="'Khmer', 'Khmer OS Moul Light', sans-serif">Khmer OS Moul Light</option>
                                <option value="'Khmer', 'Khmer OS Battambang', sans-serif">Khmer OS Battambang</option>
                                <option value="'Khmer', 'Khmer OS Siemreap', sans-serif">Khmer OS Siemreap</option>
                                <option value="'Khmer', 'Moul', sans-serif">Moul</option>
                                <option value="'Khmer', 'Arial', sans-serif">Arial</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">ទំហំអក្សរ</label>
                            <input type="range" id="fontSize" min="6" max="16" value="8" class="w-full mt-2">
                            <span id="fontSizeValue" class="text-sm">8px</span>
                        </div>
                    </div>
                </div>
                
                <!-- Card Size -->
                <div class="mb-6 border-b pb-4">
                    <h3 class="font-bold text-gray-700 mb-3">📏 ទំហំកាត</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600">ទទឹង (px)</label>
                            <input type="number" id="cardWidth" value="246" class="w-full border rounded p-2 mt-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">កម្ពស់ (px)</label>
                            <input type="number" id="cardHeight" value="321" class="w-full border rounded p-2 mt-1">
                        </div>
                    </div>
                </div>
                
                <!-- Photo Settings -->
                <div class="mb-6 border-b pb-4">
                    <h3 class="font-bold text-gray-700 mb-3">🖼️ រូបថតសិស្ស</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600">ទទឹង (px)</label>
                            <input type="number" id="photoWidth" value="75" class="w-full border rounded p-2 mt-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">កម្ពស់ (px)</label>
                            <input type="number" id="photoHeight" value="95" class="w-full border rounded p-2 mt-1">
                        </div>
                    </div>
                </div>
                
                <!-- Stamp Settings -->
                <div class="mb-6 border-b pb-4">
                    <h3 class="font-bold text-gray-700 mb-3">🏷️ ត្រា</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600">ទទឹង (px)</label>
                            <input type="number" id="stampWidth" value="60" class="w-full border rounded p-2 mt-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">កម្ពស់ (px)</label>
                            <input type="number" id="stampHeight" value="75" class="w-full border rounded p-2 mt-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">គម្លាត (px)</label>
                            <input type="number" id="stampGap" value="5" class="w-full border rounded p-2 mt-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">តម្លាភាព</label>
                            <input type="range" id="stampOpacity" min="0" max="1" step="0.05" value="0.9" class="w-full mt-2">
                            <span id="stampOpacityValue" class="text-sm">0.9</span>
                        </div>
                    </div>
                </div>
                
                <!-- Upload Images -->
                <div class="mb-6 border-b pb-4">
                    <h3 class="font-bold text-gray-700 mb-3">📤 ប្ដូររូបភាព</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600">Logo សាលា</label>
                            <input type="file" id="uploadLogo" accept="image/*" class="w-full border rounded p-2 mt-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">ហត្ថលេខា</label>
                            <input type="file" id="uploadSignature" accept="image/*" class="w-full border rounded p-2 mt-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">ត្រា</label>
                            <input type="file" id="uploadStamp" accept="image/*" class="w-full border rounded p-2 mt-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">Watermark</label>
                            <input type="file" id="uploadWatermark" accept="image/*" class="w-full border rounded p-2 mt-1">
                        </div>
                    </div>
                </div>
                
                <!-- Color Settings -->
                <div class="mb-6 border-b pb-4">
                    <h3 class="font-bold text-gray-700 mb-3">🎨 ពណ៌</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600">ពណ៌ផ្ទៃខាងក្រោយ</label>
                            <input type="color" id="bgColor" value="#f5f5f0" class="w-full h-10 rounded border p-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">ពណ៌ស៊ុម</label>
                            <input type="color" id="borderColor" value="#4A86E8" class="w-full h-10 rounded border p-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">ពណ៌អក្សរ(ងងឹត)</label>
                            <input type="color" id="darkTextColor" value="#233D2E" class="w-full h-10 rounded border p-1">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">ពណ៌តម្លៃ(ខៀវ)</label>
                            <input type="color" id="blueValueColor" value="#304FFE" class="w-full h-10 rounded border p-1">
                        </div>
                    </div>
                </div>
                
                <!-- Export/Import -->
                <div class="flex space-x-4 mt-6">
                    <button id="applyBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 flex-1">✅ អនុវត្តការកំណត់</button>
                    <button id="resetBtn" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 flex-1">🔄 កំណត់ឡើងវិញ</button>
                </div>
                <div class="flex space-x-4 mt-3">
                    <button id="exportConfigBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 flex-1">💾 ទាញយក Config</button>
                    <input type="file" id="importConfigBtn" accept=".json" class="hidden">
                    <button id="importConfigTrigger" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 flex-1">📂 ផ្ទុក Config</button>
                </div>
            </div>
            
            <!-- Right Panel: Preview -->
            <div class="preview-card">
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h2 class="text-xl font-bold mb-4 text-gray-700">👁️ មើលជាមុន</h2>
                    <div id="previewContainer" class="flex justify-center">
                        <!-- Preview card will be displayed here -->
                    </div>
                    <div class="mt-4 flex space-x-2">
                        <button id="downloadPreviewBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 flex-1">📥 ទាញយកជារូបភាព</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // DEFAULT CONFIGURATION
        // ============================================
        let cardConfig = {
            cardWidth: 246,
            cardHeight: 321,
            fontFamily: "'Khmer', 'Khmer OS Moul Light', sans-serif",
            fontSize: 8,
            photoWidth: 75,
            photoHeight: 95,
            stampWidth: 60,
            stampHeight: 75,
            stampGap: 5,
            stampOpacity: 0.9,
            bgColor: "#f5f5f0",
            borderColor: "#4A86E8",
            darkTextColor: "#233D2E",
            blueValueColor: "#304FFE"
        };
        
        // Custom images (base64)
        let customLogo = null;
        let customSignature = null;
        let customStamp = null;
        let customWatermark = null;
        
        // Sample student data for preview
        let previewStudent = {
            studentID: "STU-001",
            name: "សុខ សុភក្ត្រា",
            sex: "ប្រុស",
            date_of_birth: "2007-06-12",
            address: "ភ្នំពេញ",
            phonenumber: "012345678",
            fathername: "សុខ សារ៉ន",
            mothername: "សុខ សុវណ្ណ",
            class: "ថ្នាក់ទី១២A",
            photo: null
        };
        
        // ============================================
        // GENERATE PREVIEW CARD
        // ============================================
        function getPreviewLogo() {
            if (customLogo) {
                return `<img src="${customLogo}" alt="Logo" style="width: 35px; height: 35px; object-fit: contain;">`;
            }
            return `<svg width="35" height="35" viewBox="0 0 100 100" fill="${cardConfig.darkTextColor}">
                        <circle cx="50" cy="50" r="45" stroke="${cardConfig.darkTextColor}" stroke-width="2" fill="none"/>
                        <path d="M50 15 L70 35 L70 65 L50 85 L30 65 L30 35 Z" stroke="${cardConfig.darkTextColor}" stroke-width="2" fill="none"/>
                        <text x="50" y="55" text-anchor="middle" font-size="20" fill="${cardConfig.darkTextColor}" font-weight="bold">សា</text>
                    </svg>`;
        }
        
        function getPreviewSignature() {
            if (customSignature) {
                return `<img src="${customSignature}" alt="Signature" style="width: 100px; height: auto; max-height: 40px; object-fit: contain;">`;
            }
            return `<svg width="100" height="35" viewBox="0 0 200 50" fill="#1a56db">
                        <path d="M10 25 Q30 15 50 25 Q70 35 90 25 Q110 15 130 25 Q150 35 170 25" stroke="#1a56db" stroke-width="2" fill="none"/>
                        <text x="180" y="28" font-size="12" fill="#1a56db">សុខ</text>
                    </svg>`;
        }
        
        function getPreviewStamp() {
            if (customStamp) {
                return `<img src="${customStamp}" alt="Stamp" style="width: 100%; height: 100%; object-fit: contain;">`;
            }
            return `<svg viewBox="0 0 100 100" fill="currentColor">
                        <circle cx="50" cy="50" r="45" stroke="#D50000" stroke-width="2" fill="none"/>
                        <text x="50" y="55" text-anchor="middle" font-size="14" fill="#D50000">ត្រា</text>
                    </svg>`;
        }
        
        function getPreviewWatermark() {
            if (customWatermark) {
                return `<img src="${customWatermark}" alt="Watermark" style="width: 100%; height: 100%; object-fit: contain; opacity: 0.12;">`;
            }
            return `<svg viewBox="0 0 200 200" fill="${cardConfig.darkTextColor}">
                        <circle cx="100" cy="100" r="90" stroke="${cardConfig.darkTextColor}" stroke-width="3" fill="none"/>
                        <path d="M100 30 L140 70 L140 130 L100 170 L60 130 L60 70 Z" stroke="${cardConfig.darkTextColor}" stroke-width="3" fill="none"/>
                    </svg>`;
        }
        
        function generatePreviewCard() {
            const birthDate = previewStudent.date_of_birth ? new Date(previewStudent.date_of_birth).toLocaleDateString('km-KH') : '____/____/______';
            const studentID = previewStudent.studentID;
            
            return `
                <div class="student-id-card-preview" style="width: ${cardConfig.cardWidth}px; height: ${cardConfig.cardHeight}px; background: ${cardConfig.bgColor}; border: 1px solid ${cardConfig.borderColor}; border-radius: 4px; padding: 8px 10px; font-family: ${cardConfig.fontFamily}; font-size: ${cardConfig.fontSize}px; position: relative; overflow: visible; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    
                    <!-- Watermark -->
                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; opacity: 0.12; z-index: 0;">
                        ${getPreviewWatermark()}
                    </div>
                    
                    <!-- Header -->
                    <div style="display: flex; justify-content: space-between; margin-bottom: 6px; position: relative; z-index: 1;">
                        <div>${getPreviewLogo()}</div>
                        <div style="text-align: right;">
                            <div style="font-size: ${cardConfig.fontSize}px; color: ${cardConfig.darkTextColor};">ព្រះរាជាណាចក្រកម្ពុជា</div>
                            <div style="font-size: ${cardConfig.fontSize}px; color: ${cardConfig.darkTextColor};">ជាតិ សាសនា ព្រះមហាក្សត្រ</div>
                        </div>
                    </div>
                    
                    <!-- Ministry -->
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; position: relative; z-index: 1;">
                        <div>
                            <div style="font-size: ${cardConfig.fontSize-1}px; color: ${cardConfig.darkTextColor};">ក្រសួងអប់រំ យុវជន និងកីឡា</div>
                            <div style="font-size: ${cardConfig.fontSize-1}px; color: ${cardConfig.darkTextColor};">មន្ទីរក្រសួងអប់រំ យុវជន និងកីឡា</div>
                            <div style="font-size: ${cardConfig.fontSize}px; font-weight: bold; color: ${cardConfig.darkTextColor};">វិទ្យាល័យកំរៀង</div>
                        </div>
                        <div>${generateQRCode(studentID)}</div>
                    </div>
                    
                    <!-- Title -->
                    <div style="text-align: center; margin-bottom: 10px; position: relative; z-index: 1;">
                        <div style="font-size: ${cardConfig.fontSize+3}px; font-weight: bold; color: #D28A17;">បណ្ណសម្គាល់ខ្លួនសិស្ស</div>
                        <div style="font-size: ${cardConfig.fontSize}px; color: #3D8BFF;">ឆ្នាំសិក្សា ២០២៥-២០២៦</div>
                    </div>
                    
                    <!-- Info Grid -->
                    <div style="margin-bottom: 8px; position: relative; z-index: 1;">
                        <div style="display: grid; grid-template-columns: 55px 1fr 40px 1fr; gap: 4px; margin-bottom: 5px;">
                            <span style="color: ${cardConfig.darkTextColor};">គោត្តនាម និងនាម</span>
                            <span style="color: ${cardConfig.blueValueColor};">${previewStudent.name}</span>
                            <span style="color: ${cardConfig.darkTextColor};">ភេទ</span>
                            <span style="color: ${cardConfig.blueValueColor};">${previewStudent.sex}</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 55px 1fr; gap: 4px; margin-bottom: 5px;">
                            <span style="color: ${cardConfig.darkTextColor};">ថ្ងៃខែឆ្នាំកំណើត</span>
                            <span style="color: ${cardConfig.blueValueColor};">${birthDate}</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 55px 1fr; gap: 4px; margin-bottom: 5px;">
                            <span style="color: ${cardConfig.darkTextColor};">ទីកន្លែងកំណើត</span>
                            <span style="color: ${cardConfig.blueValueColor};">${previewStudent.address}</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 55px 1fr 55px 1fr; gap: 4px; margin-bottom: 5px;">
                            <span style="color: ${cardConfig.darkTextColor};">លេខទូរស័ព្ទ</span>
                            <span style="color: ${cardConfig.blueValueColor};">${previewStudent.phonenumber}</span>
                            <span style="color: ${cardConfig.darkTextColor};">ឈ្មោះឪពុក</span>
                            <span style="color: ${cardConfig.blueValueColor};">${previewStudent.fathername}</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 55px 1fr 55px 1fr; gap: 4px; margin-bottom: 5px;">
                            <span></span><span></span>
                            <span style="color: ${cardConfig.darkTextColor};">ឈ្មោះម្តាយ</span>
                            <span style="color: ${cardConfig.blueValueColor};">${previewStudent.mothername}</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 55px 1fr; gap: 4px;">
                            <span style="color: ${cardConfig.darkTextColor};">អត្តលេខ</span>
                            <span style="color: ${cardConfig.blueValueColor};">${studentID}</span>
                        </div>
                    </div>
                    
                    <!-- Bottom Section -->
                    <div style="display: flex; gap: 10px; position: relative; z-index: 1; margin-top: 5px;">
                        <div>
                            <div style="width: ${cardConfig.photoWidth}px; height: ${cardConfig.photoHeight}px; border: 1px solid ${cardConfig.borderColor}; border-radius: 3px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; position: relative; overflow: visible;">
                                <svg width="30" height="30" viewBox="0 0 24 24" fill="#aaa"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                                <div style="position: absolute; top: 0; left: 100%; margin-left: ${cardConfig.stampGap}px; width: ${cardConfig.stampWidth}px; height: ${cardConfig.stampHeight}px; display: flex; align-items: center; justify-content: center; opacity: ${cardConfig.stampOpacity};">
                                    ${getPreviewStamp()}
                                </div>
                            </div>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: ${cardConfig.fontSize-2}px; color: ${cardConfig.darkTextColor};">ថ្ងៃសៅរ៍ ១១កើត ខែកត្តិក ឆ្នាំម្សាញ់ ព.ស ២៥៦៩</div>
                            <div style="font-size: ${cardConfig.fontSize-2}px; color: ${cardConfig.darkTextColor};">វិ.កំរៀង , ថ្ងៃទី១ ខែវិច្ឆិកា ឆ្នាំ២០២៥</div>
                            <div style="text-align: right;">
                                <div style="font-size: ${cardConfig.fontSize-1}px; font-weight: bold; color: ${cardConfig.darkTextColor};">នាយកវិទ្យាល័យ</div>
                                <div>${getPreviewSignature()}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // QR Code Generator
        function generateQRCode(studentID) {
            return `<svg width="45" height="45" viewBox="0 0 100 100" fill="${cardConfig.darkTextColor}">
                        <rect x="10" y="10" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="26" y="10" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="42" y="10" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="58" y="10" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="74" y="10" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="10" y="26" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="42" y="26" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="74" y="26" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="10" y="42" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="26" y="42" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="42" y="42" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="58" y="42" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="74" y="42" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="26" y="58" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="42" y="58" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="74" y="58" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="10" y="74" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="42" y="74" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="58" y="74" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                        <rect x="74" y="74" width="8" height="8" fill="${cardConfig.darkTextColor}"/>
                    </svg>`;
        }
        
        // Update preview
        function updatePreview() {
            const container = document.getElementById('previewContainer');
            container.innerHTML = generatePreviewCard();
        }
        
        // Load configuration from controls
        function loadConfigFromControls() {
            cardConfig.cardWidth = parseInt(document.getElementById('cardWidth').value);
            cardConfig.cardHeight = parseInt(document.getElementById('cardHeight').value);
            cardConfig.fontFamily = document.getElementById('fontFamily').value;
            cardConfig.fontSize = parseInt(document.getElementById('fontSize').value);
            cardConfig.photoWidth = parseInt(document.getElementById('photoWidth').value);
            cardConfig.photoHeight = parseInt(document.getElementById('photoHeight').value);
            cardConfig.stampWidth = parseInt(document.getElementById('stampWidth').value);
            cardConfig.stampHeight = parseInt(document.getElementById('stampHeight').value);
            cardConfig.stampGap = parseInt(document.getElementById('stampGap').value);
            cardConfig.stampOpacity = parseFloat(document.getElementById('stampOpacity').value);
            cardConfig.bgColor = document.getElementById('bgColor').value;
            cardConfig.borderColor = document.getElementById('borderColor').value;
            cardConfig.darkTextColor = document.getElementById('darkTextColor').value;
            cardConfig.blueValueColor = document.getElementById('blueValueColor').value;
            
            document.getElementById('fontSizeValue').innerText = cardConfig.fontSize + 'px';
            document.getElementById('stampOpacityValue').innerText = cardConfig.stampOpacity;
        }
        
        // Apply configuration
        function applyConfig() {
            loadConfigFromControls();
            updatePreview();
            // Save to localStorage for use in other pages
            localStorage.setItem('cardConfig', JSON.stringify(cardConfig));
            localStorage.setItem('customLogo', customLogo);
            localStorage.setItem('customSignature', customSignature);
            localStorage.setIdem('customStamp', customStamp);
            alert('✅ បានរក្សាទុកការកំណត់ដោយជោគជ័យ!');
        }
        
        // Reset to default
        function resetConfig() {
            cardConfig = {
                cardWidth: 246, cardHeight: 321,
                fontFamily: "'Khmer', 'Khmer OS Moul Light', sans-serif",
                fontSize: 8,
                photoWidth: 75, photoHeight: 95,
                stampWidth: 60, stampHeight: 75,
                stampGap: 5, stampOpacity: 0.9,
                bgColor: "#f5f5f0", borderColor: "#4A86E8",
                darkTextColor: "#233D2E", blueValueColor: "#304FFE"
            };
            customLogo = null;
            customSignature = null;
            customStamp = null;
            customWatermark = null;
            
            // Reset form values
            document.getElementById('cardWidth').value = cardConfig.cardWidth;
            document.getElementById('cardHeight').value = cardConfig.cardHeight;
            document.getElementById('fontFamily').value = cardConfig.fontFamily;
            document.getElementById('fontSize').value = cardConfig.fontSize;
            document.getElementById('photoWidth').value = cardConfig.photoWidth;
            document.getElementById('photoHeight').value = cardConfig.photoHeight;
            document.getElementById('stampWidth').value = cardConfig.stampWidth;
            document.getElementById('stampHeight').value = cardConfig.stampHeight;
            document.getElementById('stampGap').value = cardConfig.stampGap;
            document.getElementById('stampOpacity').value = cardConfig.stampOpacity;
            document.getElementById('bgColor').value = cardConfig.bgColor;
            document.getElementById('borderColor').value = cardConfig.borderColor;
            document.getElementById('darkTextColor').value = cardConfig.darkTextColor;
            document.getElementById('blueValueColor').value = cardConfig.blueValueColor;
            
            document.getElementById('fontSizeValue').innerText = cardConfig.fontSize + 'px';
            document.getElementById('stampOpacityValue').innerText = cardConfig.stampOpacity;
            
            updatePreview();
            alert('🔄 បានកំណត់តម្លៃដើមវិញ!');
        }
        
        // Export configuration
        function exportConfig() {
            const config = {
                cardConfig: cardConfig,
                customLogo: customLogo,
                customSignature: customSignature,
                customStamp: customStamp,
                customWatermark: customWatermark
            };
            const dataStr = JSON.stringify(config, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'card-config.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Import configuration
        function importConfig(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const config = JSON.parse(e.target.result);
                    cardConfig = config.cardConfig;
                    customLogo = config.customLogo;
                    customSignature = config.customSignature;
                    customStamp = config.customStamp;
                    customWatermark = config.customWatermark;
                    
                    // Update form
                    document.getElementById('cardWidth').value = cardConfig.cardWidth;
                    document.getElementById('cardHeight').value = cardConfig.cardHeight;
                    document.getElementById('fontFamily').value = cardConfig.fontFamily;
                    document.getElementById('fontSize').value = cardConfig.fontSize;
                    document.getElementById('photoWidth').value = cardConfig.photoWidth;
                    document.getElementById('photoHeight').value = cardConfig.photoHeight;
                    document.getElementById('stampWidth').value = cardConfig.stampWidth;
                    document.getElementById('stampHeight').value = cardConfig.stampHeight;
                    document.getElementById('stampGap').value = cardConfig.stampGap;
                    document.getElementById('stampOpacity').value = cardConfig.stampOpacity;
                    document.getElementById('bgColor').value = cardConfig.bgColor;
                    document.getElementById('borderColor').value = cardConfig.borderColor;
                    document.getElementById('darkTextColor').value = cardConfig.darkTextColor;
                    document.getElementById('blueValueColor').value = cardConfig.blueValueColor;
                    
                    document.getElementById('fontSizeValue').innerText = cardConfig.fontSize + 'px';
                    document.getElementById('stampOpacityValue').innerText = cardConfig.stampOpacity;
                    
                    updatePreview();
                    alert('✅ បានផ្ទុកការកំណត់ដោយជោគជ័យ!');
                } catch(err) {
                    alert('❌ កំហុស: ឯកសារមិនត្រឹមត្រូវ');
                }
            };
            reader.readAsText(file);
        }
        
        // Handle image uploads
        function handleImageUpload(inputId, setter) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        setter(event.target.result);
                        updatePreview();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        
        // Download preview as image
        async function downloadPreview() {
            const cardElement = document.querySelector('#previewContainer > div');
            if (!cardElement) {
                alert('មិនមានកាតដើម្បីទាញយកទេ');
                return;
            }
            try {
                const canvas = await html2canvas(cardElement, { scale: 2, backgroundColor: null });
                const link = document.createElement('a');
                link.download = 'card-preview.png';
                link.href = canvas.toDataURL();
                link.click();
                alert('✅ បានទាញយកដោយជោគជ័យ!');
            } catch(error) {
                alert('កើតមានបញ្ហា: ' + error.message);
            }
        }
        
        // Event listeners
        document.getElementById('applyBtn').addEventListener('click', applyConfig);
        document.getElementById('resetBtn').addEventListener('click', resetConfig);
        document.getElementById('exportConfigBtn').addEventListener('click', exportConfig);
        document.getElementById('importConfigTrigger').addEventListener('click', () => {
            document.getElementById('importConfigBtn').click();
        });
        document.getElementById('importConfigBtn').addEventListener('change', (e) => {
            if (e.target.files[0]) importConfig(e.target.files[0]);
        });
        document.getElementById('downloadPreviewBtn').addEventListener('click', downloadPreview);
        
        // Range sliders display
        document.getElementById('fontSize').addEventListener('input', (e) => {
            document.getElementById('fontSizeValue').innerText = e.target.value + 'px';
        });
        document.getElementById('stampOpacity').addEventListener('input', (e) => {
            document.getElementById('stampOpacityValue').innerText = e.target.value;
        });
        
        // Image uploads
        handleImageUpload('uploadLogo', (val) => customLogo = val);
        handleImageUpload('uploadSignature', (val) => customSignature = val);
        handleImageUpload('uploadStamp', (val) => customStamp = val);
        handleImageUpload('uploadWatermark', (val) => customWatermark = val);
        
        // Load saved config from localStorage
        const savedConfig = localStorage.getItem('cardConfig');
        if (savedConfig) {
            try {
                const config = JSON.parse(savedConfig);
                cardConfig = config;
                document.getElementById('cardWidth').value = cardConfig.cardWidth;
                document.getElementById('cardHeight').value = cardConfig.cardHeight;
                document.getElementById('fontFamily').value = cardConfig.fontFamily;
                document.getElementById('fontSize').value = cardConfig.fontSize;
                document.getElementById('photoWidth').value = cardConfig.photoWidth;
                document.getElementById('photoHeight').value = cardConfig.photoHeight;
                document.getElementById('stampWidth').value = cardConfig.stampWidth;
                document.getElementById('stampHeight').value = cardConfig.stampHeight;
                document.getElementById('stampGap').value = cardConfig.stampGap;
                document.getElementById('stampOpacity').value = cardConfig.stampOpacity;
                document.getElementById('bgColor').value = cardConfig.bgColor;
                document.getElementById('borderColor').value = cardConfig.borderColor;
                document.getElementById('darkTextColor').value = cardConfig.darkTextColor;
                document.getElementById('blueValueColor').value = cardConfig.blueValueColor;
                document.getElementById('fontSizeValue').innerText = cardConfig.fontSize + 'px';
                document.getElementById('stampOpacityValue').innerText = cardConfig.stampOpacity;
            } catch(e) {}
        }
        
        // Initial preview
        updatePreview();
    </script>
</body>
</html>
